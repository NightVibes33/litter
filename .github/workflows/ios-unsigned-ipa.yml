name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: "fast-device"
        type: choice
        options:
          - fast-device
          - release-device
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - 'Package.swift'
      - 'apps/ios/**'
      - 'patches/codex/**'
      - 'shared/rust-bridge/**'
      - 'shared/third_party/codex/**'
      - 'ThirdParty/Nyxian/**'
      - 'ThirdParty/LLVM-On-iOS/**'
      - 'tools/scripts/load-sccache-aws-creds.sh'
      - 'tools/scripts/package-buildkit-assets.sh'
      - 'tools/scripts/build-litter-buildkit-native.sh'
      - 'tools/scripts/upload-buildkit-assets-release.sh'
      - 'tools/scripts/vendor-nyxian.sh'
      - 'tools/scripts/verify-nyxian-source-import.sh'
      - 'tools/scripts/build-nyxian-buildkit-assets.sh'
      - 'tools/scripts/verify-nyxian-buildkit-assets.sh'
      - '.github/workflows/ios-unsigned-ipa.yml'

permissions:
  contents: read

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  # Do not cancel an active Rust prebuild run. New pushes still trigger CI,
  # but they queue behind the current run so the generated Rust cache can save.
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    name: Build unsigned SideStore/AltStore IPA
    runs-on: macos-26
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "2"
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_HTTP_MULTIPLEXING: "false"
      IOS_RUST_PROFILE: mobile-release
      RUSTC_WRAPPER: ""
      SCCACHE_DISABLE: "1"
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
      LITTER_BUILDKIT_ASSET_URL: ${{ secrets.LITTER_BUILDKIT_ASSET_URL }}
      LITTER_BUILDKIT_ASSET_SHA256: ${{ secrets.LITTER_BUILDKIT_ASSET_SHA256 }}
      LITTER_BUILDKIT_ASSET_TOKEN: ${{ secrets.LITTER_BUILDKIT_ASSET_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Show toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          swift --version

      - name: Verify Nyxian source import
        run: |
          set -euo pipefail
          tools/scripts/verify-nyxian-source-import.sh

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: homebrew-ios-${{ runner.os }}-xcodegen-cmake-meson-ninja-v3

      - name: Install Xcode project dependency
        run: |
          set -euo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          brew list meson >/dev/null 2>&1 || brew install meson
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,i686-unknown-linux-musl

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ios-cargo-registry-${{ runner.os }}-${{ hashFiles('shared/rust-bridge/Cargo.lock') }}
          restore-keys: |
            ios-cargo-registry-${{ runner.os }}-

      # Intentionally do not cache shared/rust-bridge/target here. That cache is huge,
      # frequently times out during restore, and is redundant with the generated
      # iOS static library cache below for unsigned IPA builds.

      - name: Restore prebuilt Rust iOS device library
        id: rust_generated_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/ios/GeneratedRust
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          key: ios-rust-generated-v3-${{ runner.os }}-${{ hashFiles('apps/ios/scripts/build-rust.sh', 'apps/ios/scripts/sync-codex.sh', 'shared/rust-bridge/Cargo.lock', 'shared/rust-bridge/Cargo.toml', 'shared/rust-bridge/codex-mobile-client/Cargo.toml', 'shared/rust-bridge/codex-mobile-client/src/**', 'patches/codex/**') }}
          restore-keys: |
            ios-rust-generated-v3-${{ runner.os }}-

      - name: Restore Swift UniFFI binding cache
        id: swift_bindings_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .build-stamps/bindings-swift
            shared/rust-bridge/generated/swift
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
            apps/ios/GeneratedRust/Headers/module.modulemap
          key: ios-swift-uniffi-bindings-v2-${{ runner.os }}-${{ hashFiles('Makefile', 'shared/rust-bridge/Cargo.lock', 'shared/rust-bridge/Cargo.toml', 'shared/rust-bridge/uniffi-bindgen/**', 'shared/rust-bridge/codex-mobile-client/Cargo.toml', 'shared/rust-bridge/codex-mobile-client/src/**', 'patches/codex/**') }}
          restore-keys: |
            ios-swift-uniffi-bindings-v2-${{ runner.os }}-

      - name: Cache generated iOS assets
        uses: actions/cache@v4
        with:
          path: |
            apps/ios/Resources/fs
            .build-stamps
            build/DerivedData
          key: ios-generated-assets-${{ runner.os }}-${{ hashFiles('Makefile', 'apps/ios/project.yml', 'apps/ios/scripts/**') }}
          restore-keys: |
            ios-generated-assets-${{ runner.os }}-

      - name: Restore prebuilt llama.cpp XCFramework
        id: llama_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/ios/Frameworks/llama.xcframework
            apps/ios/Frameworks/llama.version
            .build-stamps/llama-ios-turboquant-main
            ~/Library/Caches/litter-build/llama.cpp
          key: ios-llama-turboquant-xcframework-v1-${{ runner.os }}-${{ hashFiles('Makefile', 'apps/ios/project.yml', 'apps/ios/scripts/build-llama-xcframework.sh') }}
          restore-keys: |
            ios-llama-turboquant-xcframework-v1-${{ runner.os }}-

      - name: Check prebuilt llama.cpp XCFramework
        id: llama_prebuilt
        run: |
          set -euo pipefail
          if [ -d apps/ios/Frameworks/llama.xcframework ] && [ -f apps/ios/Frameworks/llama.version ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using cached llama.cpp XCFramework."
            cat apps/ios/Frameworks/llama.version
            find apps/ios/Frameworks/llama.xcframework -maxdepth 3 -type f -print | sed -n '1,20p'
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No valid cached llama.cpp XCFramework found."
          fi

      - name: Install llama.cpp build dependencies
        if: steps.llama_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Ensure Swift UniFFI binding
        run: |
          set -euo pipefail
          missing=0
          require_file() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "::warning::Missing Swift UniFFI cache file: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }

          require_file apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
          require_file apps/ios/GeneratedRust/Headers/module.modulemap

          stale=0
          if [ "$missing" -eq 0 ]; then
            if ! grep -q "func ishRuntimePreflight" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "::warning::Swift UniFFI binding is stale: missing ishRuntimePreflight()."
              stale=1
            fi
            if ! grep -q "AppThreadGoal" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "::warning::Swift UniFFI binding is stale: missing AppThreadGoal."
              stale=1
            fi
            if ! grep -q "ish_runtime_preflight" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "::warning::Swift UniFFI C header is stale: missing ish_runtime_preflight."
              stale=1
            fi
          fi

          if [ "$missing" -eq 0 ] && [ "$stale" -eq 0 ]; then
            echo "Generated Swift UniFFI binding and headers already exist."
          else
            echo "Generated Swift UniFFI binding/header files are missing or stale."
            echo "Regenerating Swift binding only; this does not rebuild the iOS Rust staticlib."
            rm -f .build-stamps/bindings-swift
            time make bindings-swift
          fi

      - name: Save Swift UniFFI binding cache
        if: steps.swift_bindings_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .build-stamps/bindings-swift
            shared/rust-bridge/generated/swift
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
            apps/ios/GeneratedRust/Headers/module.modulemap
          key: ${{ steps.swift_bindings_cache.outputs.cache-primary-key }}

      - name: Check prebuilt Rust device library
        id: rust_prebuilt
        run: |
          set -euo pipefail
          BUILD_MODE="${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'fast-device' }}"
          if [ "$BUILD_MODE" != "fast-device" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Release-device mode intentionally rebuilds Rust."
            exit 0
          fi

          if [ "${{ steps.rust_generated_cache.outputs.cache-hit }}" != "true" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No exact Rust generated cache hit; rebuilding the Rust device library instead of trusting a restore-key fallback."
            exit 0
          fi

          missing=0
          require_file() {
            local path="$1"
            if [ ! -f "$path" ]; then
              echo "::warning::Missing Rust cache file: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }
          require_nonempty() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "::warning::Missing or empty Rust cache file: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }

          require_nonempty apps/ios/GeneratedRust/ios-device/libcodex_mobile_client.a
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
          if [ "$missing" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using cached prebuilt Rust iOS device library."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No valid cached prebuilt Rust iOS device library found."
            echo "GeneratedRust contents:"
            find apps/ios/GeneratedRust -maxdepth 3 -type f -print 2>/dev/null | sed -n '1,80p' || true
          fi

      - name: Warm Rust dependency cache
        if: steps.rust_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --connect-timeout 15 --max-time 60 https://index.crates.io/config.json >/dev/null; then
              break
            fi
            echo "crates.io DNS/network check failed, retry $attempt/5" >&2
            sleep $((attempt * 10))
          done
          time cargo fetch             --manifest-path shared/rust-bridge/Cargo.toml             --target aarch64-apple-ios             --target i686-unknown-linux-musl

      - name: Build Rust iOS device library
        if: steps.rust_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          BUILD_MODE="${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'fast-device' }}"
          echo "Using build mode: $BUILD_MODE"
          if [ "$BUILD_MODE" = "fast-device" ]; then
            if [ -f apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h ] && [ -f apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift ]; then
              time ./apps/ios/scripts/build-rust.sh --preserve-current --fast-device --skip-bindings
            else
              echo "Generated UniFFI bindings are missing; generating them once before the fast device build."
              time ./apps/ios/scripts/build-rust.sh --preserve-current --fast-device
            fi
          else
            time ./apps/ios/scripts/build-rust.sh --preserve-current --device-only
          fi

      - name: Save prebuilt Rust iOS device library
        if: steps.rust_generated_cache.outputs.cache-hit != 'true' && steps.rust_prebuilt.outputs.available != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            apps/ios/GeneratedRust
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          key: ${{ steps.rust_generated_cache.outputs.cache-primary-key }}

      - name: Prepare Alpine filesystem
        run: |
          set -euo pipefail
          time make alpine-fs

      - name: Build llama.cpp XCFramework
        if: steps.llama_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          export LLAMA_CPP_FLAVOR=turboquant
          export LLAMA_CPP_REPO=https://github.com/animehacker/llama-turboquant.git
          export LLAMA_CPP_VERSION=main
          time make llama-ios

      - name: Save prebuilt llama.cpp XCFramework
        if: steps.llama_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            apps/ios/Frameworks/llama.xcframework
            apps/ios/Frameworks/llama.version
            .build-stamps/llama-ios-turboquant-main
            ~/Library/Caches/litter-build/llama.cpp
          key: ${{ steps.llama_cache.outputs.cache-primary-key }}

      - name: Restore prepared private BuildKit assets
        id: buildkit_assets_cache
        if: env.LITTER_BUILDKIT_ASSET_SHA256 != ''
        uses: actions/cache/restore@v4
        with:
          path: apps/ios/Sources/Litter/Resources/BuildKitAssets
          key: ios-buildkit-assets-v1-${{ runner.os }}-${{ env.LITTER_BUILDKIT_ASSET_SHA256 }}

      - name: Prepare private BuildKit assets
        if: steps.buildkit_assets_cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          apps/ios/scripts/prepare-buildkit-assets.sh

      - name: Verify private BuildKit assets are prepared
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          root = pathlib.Path("apps/ios/Sources/Litter/Resources/BuildKitAssets")
          manifest_path = root / "manifest.json"
          if not manifest_path.is_file():
              print("::error::Missing private BuildKitAssets/manifest.json. Configure LITTER_BUILDKIT_ASSET_URL and LITTER_BUILDKIT_ASSET_SHA256 for the Swift-capable IPA workflow.")
              sys.exit(1)

          manifest = json.loads(manifest_path.read_text())
          toolchain = manifest.get("toolchain", {})
          required = list(manifest.get("requiredPaths", []))
          for key in ("coreCompilerFramework", "nativeDriverFramework", "supportLibraries", "sdkPath", "nativeRunner"):
              value = toolchain.get(key)
              if value:
                  required.append(value)

          missing = []
          for relative in sorted(set(required)):
              if not (root / relative).exists():
                  missing.append(relative)

          sdk_path = toolchain.get("sdkPath") or "SDK/iPhoneOS26.4.sdk"
          sdk_settings = pathlib.Path(sdk_path) / "SDKSettings.plist"
          if not (root / sdk_settings).is_file():
              missing.append(str(sdk_settings))

          support_root = root / "Toolchains/Nyxian/CoreCompilerSupportLibs"
          support_dylibs = []
          if support_root.is_dir():
              support_dylibs = [
                  path for path in support_root.iterdir()
                  if path.is_file() and path.suffix == ".dylib" and (path.name.startswith("lib_Compiler") or path.name.startswith("libLLVM") or path.name.startswith("libllvm"))
              ]
          if not support_dylibs:
              missing.append("Toolchains/Nyxian/CoreCompilerSupportLibs/*.dylib")

          if missing:
              print("::error::Private BuildKit asset bundle is incomplete:")
              for item in missing:
                  print(f"- {item}")
              sys.exit(1)

          print(f"Private BuildKit assets verified: {manifest.get('bundleIdentifier', 'unknown')} SDK {manifest.get('sdkVersion', 'unknown')}")
          PY

      - name: Save prepared private BuildKit assets
        if: env.LITTER_BUILDKIT_ASSET_SHA256 != '' && steps.buildkit_assets_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: apps/ios/Sources/Litter/Resources/BuildKitAssets
          key: ${{ steps.buildkit_assets_cache.outputs.cache-primary-key }}

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          time make xcgen

      - name: Build unsigned archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$PWD/build/Litter.xcarchive"
          rm -rf "$ARCHIVE_PATH" build/unsigned-ipa Payload
          xcodebuild archive \
            -project apps/ios/Litter.xcodeproj \
            -scheme Litter \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Verify archived BuildKit asset payload
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Litter.xcarchive/Products/Applications -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in archive" >&2
            exit 1
          fi

          ASSET_ZIP="$APP_PATH/LitterBuildKitAssets.zip"
          if [ ! -s "$ASSET_ZIP" ]; then
            echo "::error::Archived app is missing LitterBuildKitAssets.zip" >&2
            find "$APP_PATH" -maxdepth 2 -name '*BuildKit*' -print >&2 || true
            exit 1
          fi
          if [ -d "$APP_PATH/BuildKitAssets" ]; then
            echo "::error::Archived app contains expanded BuildKitAssets; SDK payload must stay inside LitterBuildKitAssets.zip" >&2
            exit 1
          fi
          if find "$APP_PATH" -path "$APP_PATH/Frameworks" -prune -o -path '*/BuildKitAssets/SDK/*' -print -quit | grep -q .; then
            echo "::error::Archived app contains expanded BuildKit SDK payload outside LitterBuildKitAssets.zip" >&2
            exit 1
          fi

          if [ ! -d "$APP_PATH/Frameworks/CoreCompiler.framework" ]; then
            echo "::error::Archived app is missing embedded CoreCompiler.framework" >&2
            exit 1
          fi
          if [ -d "$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompilerSupportLibs" ]; then
            echo "::error::CoreCompilerSupportLibs must be embedded as signable app Frameworks dylibs, not nested inside CoreCompiler.framework" >&2
            exit 1
          fi
          if find "$APP_PATH/Frameworks" -path '*SDK/iPhoneOS*.sdk*' -print -quit | grep -q .; then
            echo "::error::Embedded Frameworks contain SDK payload files" >&2
            exit 1
          fi

          if [ ! -d "$APP_PATH/Frameworks/LitterBuildKitNative.framework" ]; then
            echo "::error::Archived app is missing embedded LitterBuildKitNative.framework" >&2
            exit 1
          fi

          if ! find "$APP_PATH/Frameworks" -maxdepth 1 -type f \( -name 'lib_Compiler*.dylib' -o -name 'libLLVM*.dylib' -o -name 'libllvm*.dylib' \) -print -quit | grep -q .; then
            echo "::error::Archived app is missing embedded CoreCompiler support dylibs" >&2
            exit 1
          fi

          DRIVER="$APP_PATH/Frameworks/LitterBuildKitNative.framework/LitterBuildKitNative"
          CORE="$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompiler"
          verify_code_signature() {
            binary="$1"
            signature_info="$(/usr/bin/codesign -dv --verbose=4 "$binary" 2>&1)" || {
              echo "::error::$binary is not code signed" >&2
              printf '%s\n' "$signature_info" >&2
              exit 1
            }
            if ! printf '%s\n' "$signature_info" | grep -Eq 'CDHash=|CodeDirectory'; then
              echo "::error::$binary is missing a code directory/CDHash" >&2
              printf '%s\n' "$signature_info" >&2
              exit 1
            fi
          }
          verify_code_signature "$DRIVER"
          verify_code_signature "$CORE"
          if ! /usr/bin/nm -gU "$DRIVER" | awk '{print $NF}' | grep -qx '_litter_buildkit_run_json'; then
            echo "::error::Embedded LitterBuildKitNative.framework does not export litter_buildkit_run_json" >&2
            exit 1
          fi

          is_buildkit_support_dylib_name() {
            case "$1" in
              lib_Compiler*.dylib|libLLVM*.dylib|libllvm*.dylib) return 0 ;;
              *) return 1 ;;
            esac
          }
          has_usable_frameworks_rpath() {
            binary="$1"
            rpath="$2"
            /usr/bin/otool -l "$binary" | grep -F -q "$rpath" || \
              /usr/bin/otool -l "$binary" | grep -F -q '@executable_path/Frameworks'
          }
          verify_rpath() {
            binary="$1"
            rpath="$2"
            if ! has_usable_frameworks_rpath "$binary" "$rpath"; then
              echo "::error::$binary lacks a usable Frameworks rpath" >&2
              exit 1
            fi
          }
          buildkit_expected_install_name() {
            binary="$1"
            parent="$(basename "$(dirname "$binary")")"
            base="$(basename "$binary")"
            case "$parent/$base" in
              CoreCompiler.framework/CoreCompiler|LitterBuildKitNative.framework/LitterBuildKitNative)
                printf '%s\n' "@rpath/$parent/$base"
                ;;
              *)
                if is_buildkit_support_dylib_name "$base"; then
                  printf '%s\n' "@rpath/$base"
                fi
                ;;
            esac
          }
          is_buildkit_corecompiler_reference() {
            case "$1" in
              *CoreCompiler.framework/CoreCompiler) return 0 ;;
              *) return 1 ;;
            esac
          }
          verify_buildkit_install_name() {
            binary="$1"
            expected="$(buildkit_expected_install_name "$binary")"
            if [ -z "$expected" ]; then
              return 0
            fi
            id="$(/usr/bin/otool -D "$binary" | awk 'NR == 2 { print $1 }')"
            if [ "$id" != "$expected" ]; then
              echo "::error::$binary has unexpected install name: $id" >&2
              echo "::error::Expected install name: $expected" >&2
              exit 1
            fi
          }
          verify_buildkit_dependencies_present() {
            binary="$1"
            /usr/bin/otool -L "$binary" | awk 'NR > 1 { print $1 }' | while IFS= read -r dependency; do
              base="$(basename "$dependency")"
              if is_buildkit_corecompiler_reference "$dependency"; then
                if [ "$dependency" != "@rpath/CoreCompiler.framework/CoreCompiler" ]; then
                  echo "::error::$binary links CoreCompiler without @rpath: $dependency" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
                if [ ! -f "$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompiler" ]; then
                  echo "::error::$binary links missing embedded CoreCompiler.framework/CoreCompiler" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
              elif is_buildkit_support_dylib_name "$base"; then
                if [ "$dependency" != "@rpath/$base" ]; then
                  echo "::error::$binary links compiler dylib without @rpath: $dependency" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
                if [ ! -f "$APP_PATH/Frameworks/$base" ]; then
                  echo "::error::$binary links missing embedded compiler dylib $base" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
              fi
            done
          }
          check_buildkit_rpath() {
            binary="$1"
            rpath="$2"
            verify_buildkit_install_name "$binary"
            if /usr/bin/otool -L "$binary" | grep -Eq 'CoreCompiler\.framework/CoreCompiler|lib_Compiler|libLLVM|libllvm'; then
              verify_rpath "$binary" "$rpath"
            fi
            if /usr/bin/otool -L "$binary" | grep -Eq 'BuildKitAssets/(SDK|Toolchains)|SDK/iPhoneOS.*\.sdk/usr/lib|Documents/BuildKit|Toolchains/Nyxian'; then
              echo "::error::$binary still links SDK/BuildKit asset dylib paths" >&2
              /usr/bin/otool -L "$binary" >&2
              exit 1
            fi
            verify_buildkit_dependencies_present "$binary"
          }
          check_buildkit_rpath "$DRIVER" '@loader_path/..'
          check_buildkit_rpath "$CORE" '@loader_path/..'
          find "$APP_PATH/Frameworks" -maxdepth 1 -type f \( -name 'lib_Compiler*.dylib' -o -name 'libLLVM*.dylib' -o -name 'libllvm*.dylib' \) -print | while IFS= read -r library; do
            verify_code_signature "$library"
            check_buildkit_rpath "$library" '@loader_path'
          done

          python3 - "$ASSET_ZIP" <<'PY'
          import json
          import pathlib
          import sys
          import zipfile

          zip_path = pathlib.Path(sys.argv[1])
          with zipfile.ZipFile(zip_path) as archive:
              names = set(archive.namelist())
              manifest_names = [name for name in names if name.endswith("manifest.json")]
              manifest_name = next((name for name in manifest_names if name.endswith("BuildKitAssets/manifest.json")), None)
              if manifest_name is None and manifest_names:
                  manifest_name = sorted(manifest_names)[0]
              if manifest_name is None:
                  print("::error::LitterBuildKitAssets.zip does not contain manifest.json")
                  sys.exit(1)

              prefix = manifest_name[:-len("manifest.json")]
              manifest = json.loads(archive.read(manifest_name).decode("utf-8"))
              toolchain = manifest.get("toolchain", {})
              required = list(manifest.get("requiredPaths", []))
              for key in ("coreCompilerFramework", "nativeDriverFramework", "supportLibraries", "sdkPath", "nativeRunner"):
                  value = toolchain.get(key)
                  if value:
                      required.append(value)

              def has_entry(relative):
                  relative = relative.strip("/")
                  exact = prefix + relative
                  directory = exact.rstrip("/") + "/"
                  return exact in names or directory in names or any(name.startswith(directory) for name in names)

              missing = []
              for relative in sorted(set(required)):
                  if not has_entry(relative):
                      missing.append(relative)

              sdk_path = toolchain.get("sdkPath") or "SDK/iPhoneOS26.4.sdk"
              sdk_settings = pathlib.PurePosixPath(sdk_path) / "SDKSettings.plist"
              if prefix + str(sdk_settings) not in names:
                  missing.append(str(sdk_settings))

              if missing:
                  print("::error::LitterBuildKitAssets.zip is incomplete:")
                  for item in missing:
                      print(f"- {item}")
                  sys.exit(1)

              print(f"Archived BuildKit assets verified: {manifest.get('bundleIdentifier', 'unknown')} SDK {manifest.get('sdkVersion', 'unknown')}")
          PY

      - name: Package SideStore/AltStore IPA artifact
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Litter.xcarchive/Products/Applications -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive" >&2
            find build/Litter.xcarchive -print
            exit 1
          fi

          mkdir -p Payload build/unsigned-ipa
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/*.app/_CodeSignature Payload/*.app/embedded.mobileprovision

          IPA_NAME="Litter-iOS26-Unsigned-SideStore-AltStore.ipa"
          /usr/bin/zip -qry "build/unsigned-ipa/$IPA_NAME" Payload

          INFO_PLIST="Payload/$(basename "$APP_PATH")/Info.plist"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$INFO_PLIST" 2>/dev/null || true)"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST" 2>/dev/null || true)"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST" 2>/dev/null || true)"
          cat > build/unsigned-ipa/build-metadata.json <<JSON
          {
            "name": "Litter",
            "bundleIdentifier": "$BUNDLE_ID",
            "version": "$VERSION",
            "build": "$BUILD",
            "commit": "${GITHUB_SHA}",
            "buildMode": "${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'fast-device' }}",
            "minimumIOSFamily": "26",
            "xcode": "26.3",
            "artifact": "$IPA_NAME",
            "distribution": "unsigned IPA for SideStore/AltStore re-signing; not directly installable on stock iOS without signing"
          }
          JSON

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Litter-Unsigned-iOS26-SideStore-AltStore
          path: build/unsigned-ipa
          if-no-files-found: error
