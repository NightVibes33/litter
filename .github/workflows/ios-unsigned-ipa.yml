name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: "fast-device"
        type: choice
        options:
          - fast-device
          - release-device
          - nyxian-private
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - 'Package.swift'
      - 'apps/ios/**'
      - 'patches/codex/**'
      - 'shared/third_party/ghostty'
      - 'patches/ghostty/**'
      - '.gitmodules'
      - 'shared/rust-bridge/**'
      - 'shared/third_party/codex/**'
      - 'ThirdParty/Nyxian/**'
      - 'ThirdParty/EmexDE/**'
      - 'ThirdParty/Feather/**'
      - 'ThirdParty/SideStore/**'
      - 'ThirdParty/UPSTREAMS.md'
      - 'ThirdParty/LLVM-On-iOS/**'
      - 'tools/assets/**'
      - 'tools/scripts/load-sccache-aws-creds.sh'
      - 'tools/scripts/package-buildkit-assets.sh'
      - 'tools/scripts/build-litter-buildkit-native.sh'
      - 'tools/scripts/build-sidestore-minimuxer.sh'
      - 'tools/scripts/prepare-emexde-corecompiler-artifacts.sh'
      - 'tools/scripts/patch-emexde-corecompiler-for-ios-ci.py'
      - 'tools/scripts/buildkit-native-source-fingerprint.sh'
      - 'tools/scripts/upload-buildkit-assets-release.sh'
      - 'tools/scripts/vendor-nyxian.sh'
      - 'tools/scripts/verify-nyxian-source-import.sh'
      - 'tools/scripts/verify-kittystore-integration.sh'
      - 'tools/scripts/verify-altstore-source.py'
      - 'tools/scripts/build-nyxian-buildkit-assets.sh'
      - 'tools/scripts/verify-nyxian-buildkit-assets.sh'
      - '.github/workflows/ios-unsigned-ipa.yml'

permissions:
  contents: write

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  # Do not cancel an active Rust prebuild run. New pushes still trigger CI,
  # but they queue behind the current run so the generated Rust cache can save.
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    name: Build unsigned KittyStore/AltStore IPA
    runs-on: macos-26-intel
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      CARGO_INCREMENTAL: "0"
      CARGO_BUILD_JOBS: "2"
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_HTTP_MULTIPLEXING: "false"
      IOS_RUST_PROFILE: mobile-release
      RUSTC_WRAPPER: ""
      SCCACHE_DISABLE: "1"
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
      LITTER_BUILDKIT_ASSET_URL: ${{ secrets.LITTER_BUILDKIT_ASSET_URL }}
      LITTER_BUILDKIT_ASSET_SHA256: ${{ secrets.LITTER_BUILDKIT_ASSET_SHA256 }}
      LITTER_BUILDKIT_ASSET_TOKEN: ${{ secrets.LITTER_BUILDKIT_ASSET_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
      # Push builds stay independent from private BuildKit SDK assets. The
      # manual Nyxian lane still exists for full BuildKit asset packaging.
      LITTER_IOS_BUILD_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'fast-device' }}
      LITTER_NYXIAN_PRIVATE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.build_mode == 'nyxian-private' && '1' || '0' }}
      LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS: ${{ github.event_name == 'workflow_dispatch' && inputs.build_mode == 'nyxian-private' && '1' || '0' }}
      LITTER_PRESERVE_NYXIAN_LIVEPROCESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Show toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          swift --version

      - name: Verify Nyxian source import
        run: |
          set -euo pipefail
          tools/scripts/verify-nyxian-source-import.sh

      - name: Verify KittyStore/Feather integration
        run: |
          set -euo pipefail
          tools/scripts/verify-kittystore-integration.sh

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: homebrew-ios-${{ runner.os }}-xcodegen-native-tools-v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,i686-unknown-linux-musl

      - name: Setup Zig (libghostty build)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ios-cargo-registry-${{ runner.os }}-${{ hashFiles('shared/rust-bridge/Cargo.lock', 'ThirdParty/SideStore/minimuxer/Cargo.lock') }}
          restore-keys: |
            ios-cargo-registry-${{ runner.os }}-

      # Intentionally do not cache shared/rust-bridge/target here. That cache is huge,
      # frequently times out during restore, and is redundant with the generated
      # iOS static library cache below for unsigned IPA builds.

      - name: Restore prebuilt Rust iOS device library
        id: rust_generated_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/ios/GeneratedRust
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          key: ios-rust-generated-v3-${{ runner.os }}-${{ hashFiles('apps/ios/scripts/build-rust.sh', 'apps/ios/scripts/build-ghostty.sh', 'apps/ios/scripts/sync-ghostty.sh', 'apps/ios/scripts/sync-codex.sh', 'shared/rust-bridge/Cargo.lock', 'shared/rust-bridge/Cargo.toml', 'shared/rust-bridge/codex-mobile-client/Cargo.toml', 'shared/rust-bridge/codex-mobile-client/src/**', 'shared/rust-bridge/codex-slingshot/Cargo.toml', 'shared/rust-bridge/codex-slingshot/src/**', 'patches/codex/**', 'patches/ghostty/**', 'shared/third_party/ghostty/**') }}
          restore-keys: |
            ios-rust-generated-v3-${{ runner.os }}-

      - name: Restore Swift UniFFI binding cache
        id: swift_bindings_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .build-stamps/bindings-swift
            shared/rust-bridge/generated/swift
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
            apps/ios/GeneratedRust/Headers/module.modulemap
          key: ios-swift-uniffi-bindings-v3-${{ runner.os }}-${{ hashFiles('Makefile', 'shared/rust-bridge/Cargo.lock', 'shared/rust-bridge/Cargo.toml', 'shared/rust-bridge/uniffi-bindgen/**', 'shared/rust-bridge/codex-mobile-client/Cargo.toml', 'shared/rust-bridge/codex-mobile-client/src/**', 'shared/rust-bridge/codex-slingshot/Cargo.toml', 'shared/rust-bridge/codex-slingshot/src/**', 'patches/codex/**') }}
          restore-keys: |
            ios-swift-uniffi-bindings-v3-${{ runner.os }}-

      - name: Cache generated iOS assets
        uses: actions/cache@v4
        with:
          path: |
            apps/ios/Resources/fs
            .build-stamps
            build/DerivedData
          key: ios-generated-assets-${{ runner.os }}-${{ hashFiles('Makefile', 'apps/ios/project.yml', 'apps/ios/scripts/**') }}
          restore-keys: |
            ios-generated-assets-${{ runner.os }}-

      - name: Restore Alpine filesystem cache
        id: alpine_fs_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/ios/Resources/fs
            .build-stamps/alpine-fs-*
          key: ios-alpine-fs-v1-${{ runner.os }}-${{ hashFiles('Makefile', 'apps/ios/scripts/download-alpine-fs.sh') }}
          restore-keys: |
            ios-alpine-fs-v1-${{ runner.os }}-

      - name: Restore Xcode SourcePackages cache
        uses: actions/cache@v4
        with:
          path: build/DerivedData/SourcePackages
          key: ios-xcode-sourcepackages-v1-${{ runner.os }}-${{ hashFiles('apps/ios/project.yml') }}
          restore-keys: |
            ios-xcode-sourcepackages-v1-${{ runner.os }}-

      - name: Ensure Swift UniFFI binding
        run: |
          set -euo pipefail
          missing=0
          require_file() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "Missing Swift UniFFI cache file: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }

          require_file apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
          require_file apps/ios/GeneratedRust/Headers/module.modulemap

          stale=0
          if [ "${{ steps.swift_bindings_cache.outputs.cache-hit }}" != "true" ]; then
            echo "Swift UniFFI binding cache was not an exact hit; regenerating to avoid stale fallback bindings."
            stale=1
          fi
          if [ "$missing" -eq 0 ]; then
            if ! grep -q "func ishRuntimePreflight" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing ishRuntimePreflight()."
              stale=1
            fi
            if ! grep -q "AppThreadGoal" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing AppThreadGoal."
              stale=1
            fi
            if ! grep -q "SlingshotCredentialProvider" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing SlingshotCredentialProvider."
              stale=1
            fi
            if ! grep -q "SlingshotCredentialRecord" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing SlingshotCredentialRecord."
              stale=1
            fi
            if ! grep -q "connectRemoteSlingshotUrlServer" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing connectRemoteSlingshotUrlServer()."
              stale=1
            fi
            if ! grep -q "TerminalBackendKind" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing TerminalBackendKind."
              stale=1
            fi
            if ! grep -q "openTerminalSession" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing openTerminalSession()."
              stale=1
            fi
            if ! grep -q "TerminalOutputListener" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing TerminalOutputListener."
              stale=1
            fi
            if ! grep -q "listPluginCatalog" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing listPluginCatalog()."
              stale=1
            fi
            if ! grep -q "installPlugin" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing installPlugin()."
              stale=1
            fi
            if ! grep -q "uninstallPlugin" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing uninstallPlugin()."
              stale=1
            fi
            if ! grep -q "AppPluginInstallRequest" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing AppPluginInstallRequest."
              stale=1
            fi
            if ! grep -q "AppPluginUninstallRequest" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing AppPluginUninstallRequest."
              stale=1
            fi
            if ! grep -q "AppPluginInstallResponse" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing AppPluginInstallResponse."
              stale=1
            fi
            if ! grep -q "PluginAvailability" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing PluginAvailability."
              stale=1
            fi
            if ! grep -q "remotePluginId" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing PluginSummary.remotePluginId."
              stale=1
            fi
            if ! grep -q "keywords" apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift; then
              echo "Swift UniFFI binding is stale: missing PluginSummary.keywords."
              stale=1
            fi
            if ! grep -q "ish_runtime_preflight" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "Swift UniFFI C header is stale: missing ish_runtime_preflight."
              stale=1
            fi
            if ! grep -q "connect_remote_slingshot_url_server" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "Swift UniFFI C header is stale: missing connect_remote_slingshot_url_server."
              stale=1
            fi
            if ! grep -q "terminal" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "Swift UniFFI C header is stale: missing terminal bindings."
              stale=1
            fi
            if ! grep -q "list_plugin_catalog" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "Swift UniFFI C header is stale: missing list_plugin_catalog."
              stale=1
            fi
            if ! grep -q "install_plugin" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "Swift UniFFI C header is stale: missing install_plugin."
              stale=1
            fi
            if ! grep -q "uninstall_plugin" apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h; then
              echo "Swift UniFFI C header is stale: missing uninstall_plugin."
              stale=1
            fi
          fi

          if [ "$missing" -eq 0 ] && [ "$stale" -eq 0 ]; then
            echo "Generated Swift UniFFI binding and headers already exist."
          else
            echo "Generated Swift UniFFI binding/header files are missing or stale."
            echo "Regenerating Swift binding only; this does not rebuild the iOS Rust staticlib."
            rm -f .build-stamps/bindings-swift .build-stamps/sync
            time make bindings-swift
          fi

      - name: Save Swift UniFFI binding cache
        if: steps.swift_bindings_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .build-stamps/bindings-swift
            shared/rust-bridge/generated/swift
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
            apps/ios/GeneratedRust/Headers/module.modulemap
          key: ${{ steps.swift_bindings_cache.outputs.cache-primary-key }}

      - name: Check prebuilt Rust device library
        id: rust_prebuilt
        run: |
          set -euo pipefail
          BUILD_MODE="$LITTER_IOS_BUILD_MODE"
          if [ "$BUILD_MODE" != "fast-device" ] && [ "$BUILD_MODE" != "nyxian-private" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Release-device mode intentionally rebuilds Rust."
            exit 0
          fi

          if [ "${{ steps.rust_generated_cache.outputs.cache-hit }}" != "true" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No exact Rust generated cache hit; rebuilding the Rust device library instead of trusting a restore-key fallback."
            exit 0
          fi

          missing=0
          require_file() {
            local path="$1"
            if [ ! -f "$path" ]; then
              echo "Missing Rust cache file: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }
          require_nonempty() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "Missing or empty Rust cache file: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }

          require_nonempty apps/ios/GeneratedRust/ios-device/libcodex_mobile_client.a
          require_nonempty apps/ios/GeneratedRust/ios-device/libghostty.a
          require_file apps/ios/GeneratedRust/Headers/ghostty.h
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
          require_file apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
          if [ "$missing" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using cached prebuilt Rust iOS device library."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No valid cached prebuilt Rust iOS device library found."
            echo "GeneratedRust contents:"
            find apps/ios/GeneratedRust -maxdepth 3 -type f -print 2>/dev/null | sed -n '1,80p' || true
          fi

      - name: Install Rust rebuild dependencies
        if: steps.rust_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list pkgconf >/dev/null 2>&1 || brew install pkgconf
          brew list llvm >/dev/null 2>&1 || brew install llvm
          brew list autoconf >/dev/null 2>&1 || brew install autoconf
          brew list automake >/dev/null 2>&1 || brew install automake
          brew list libtool >/dev/null 2>&1 || brew install libtool

      - name: Warm Rust dependency cache
        if: steps.rust_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --connect-timeout 15 --max-time 60 https://index.crates.io/config.json >/dev/null; then
              break
            fi
            echo "crates.io DNS/network check failed, retry $attempt/5" >&2
            sleep $((attempt * 10))
          done
          time cargo fetch             --manifest-path shared/rust-bridge/Cargo.toml             --target aarch64-apple-ios             --target i686-unknown-linux-musl

      - name: Build Rust iOS device library
        if: steps.rust_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          BUILD_MODE="$LITTER_IOS_BUILD_MODE"
          echo "Using build mode: $BUILD_MODE"
          if [ "$BUILD_MODE" = "fast-device" ] || [ "$BUILD_MODE" = "nyxian-private" ]; then
            if [ -f apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h ] && [ -f apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift ]; then
              time ./apps/ios/scripts/build-rust.sh --preserve-current --fast-device --skip-bindings
            else
              echo "Generated UniFFI bindings are missing; generating them once before the fast device build."
              time ./apps/ios/scripts/build-rust.sh --preserve-current --fast-device
            fi
          else
            time ./apps/ios/scripts/build-rust.sh --preserve-current --device-only
          fi

      - name: Save prebuilt Rust iOS device library
        if: steps.rust_generated_cache.outputs.cache-hit != 'true' && steps.rust_prebuilt.outputs.available != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            apps/ios/GeneratedRust
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          key: ${{ steps.rust_generated_cache.outputs.cache-primary-key }}

      - name: Prepare Alpine filesystem
        run: |
          set -euo pipefail
          time make alpine-fs

      - name: Save Alpine filesystem cache
        if: steps.alpine_fs_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            apps/ios/Resources/fs
            .build-stamps/alpine-fs-*
          key: ${{ steps.alpine_fs_cache.outputs.cache-primary-key }}

      - name: Compute private BuildKit source fingerprint
        id: buildkit_fingerprint
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS == '1'
        run: |
          set -euo pipefail
          echo "native_source_fingerprint=$(tools/scripts/buildkit-native-source-fingerprint.sh)" >> "$GITHUB_OUTPUT"

      - name: Restore prepared private BuildKit assets
        id: buildkit_assets_cache
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS == '1' && env.LITTER_BUILDKIT_ASSET_SHA256 != ''
        uses: actions/cache/restore@v4
        with:
          path: apps/ios/Sources/Litter/Resources/BuildKitAssets
          key: ios-buildkit-assets-v3-${{ runner.os }}-${{ env.LITTER_BUILDKIT_ASSET_SHA256 }}-${{ steps.buildkit_fingerprint.outputs.native_source_fingerprint }}

      - name: Prepare private BuildKit assets
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS == '1' && steps.buildkit_assets_cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          apps/ios/scripts/prepare-buildkit-assets.sh

      - name: Verify private BuildKit assets are prepared
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS == '1'
        run: |
          set -euo pipefail
          export LITTER_BUILDKIT_EXPECT_NATIVE_SOURCE_FINGERPRINT="${{ steps.buildkit_fingerprint.outputs.native_source_fingerprint }}"
          tools/scripts/verify-nyxian-buildkit-assets.sh apps/ios/Sources/Litter/Resources/BuildKitAssets
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          root = pathlib.Path("apps/ios/Sources/Litter/Resources/BuildKitAssets")
          manifest_path = root / "manifest.json"
          if not manifest_path.is_file():
              print("::error::Missing private BuildKitAssets/manifest.json. Configure LITTER_BUILDKIT_ASSET_URL and LITTER_BUILDKIT_ASSET_SHA256 for the Swift-capable IPA workflow.")
              sys.exit(1)

          manifest = json.loads(manifest_path.read_text())
          toolchain = manifest.get("toolchain", {})
          required = list(manifest.get("requiredPaths", []))
          for key in ("coreCompilerFramework", "nativeDriverFramework", "supportLibraries", "sdkPath", "nativeRunner", "swiftResourceDir"):
              value = toolchain.get(key)
              if value:
                  required.append(value)
          required.extend([
              "Toolchains/Nyxian/CoreCompiler.framework/CoreCompiler",
              "Toolchains/Nyxian/LitterBuildKitNative.framework/LitterBuildKitNative",
          ])

          missing = []
          for relative in sorted(set(required)):
              if not (root / relative).exists():
                  missing.append(relative)

          symlinks = [path.relative_to(root).as_posix() for path in root.rglob("*") if path.is_symlink()]
          if symlinks:
              missing.append("symlinks are not allowed in BuildKitAssets")

          sdk_path = toolchain.get("sdkPath") or "SDK/iPhoneOS26.4.sdk"
          swift_resource_dir = toolchain.get("swiftResourceDir") or "Toolchains/Nyxian/SwiftResourceDir"
          if not (root / swift_resource_dir / "iphoneos").is_dir():
              missing.append(str(pathlib.Path(swift_resource_dir) / "iphoneos"))
          sdk_settings = pathlib.Path(sdk_path) / "SDKSettings.plist"
          if not (root / sdk_settings).is_file():
              missing.append(str(sdk_settings))

          support_root = root / "Toolchains/Nyxian/CoreCompilerSupportLibs"
          support_dylibs = []
          if support_root.is_dir():
              support_dylibs = [
                  path for path in support_root.iterdir()
                  if path.is_file() and path.suffix == ".dylib" and (path.name.startswith("lib_Compiler") or path.name.startswith("libLLVM") or path.name.startswith("libllvm"))
              ]
          if not support_dylibs:
              missing.append("Toolchains/Nyxian/CoreCompilerSupportLibs/*.dylib")

          if missing:
              print("::error::Private BuildKit asset bundle is incomplete:")
              for item in missing:
                  print(f"- {item}")
              sys.exit(1)

          print(f"Private BuildKit assets verified: {manifest.get('bundleIdentifier', 'unknown')} SDK {manifest.get('sdkVersion', 'unknown')}")
          PY

      - name: Save prepared private BuildKit assets
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS == '1' && env.LITTER_BUILDKIT_ASSET_SHA256 != '' && steps.buildkit_assets_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: apps/ios/Sources/Litter/Resources/BuildKitAssets
          key: ${{ steps.buildkit_assets_cache.outputs.cache-primary-key }}

      - name: Restore KittyStore minimuxer bridge cache
        id: minimuxer_bridge_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/ios/GeneratedRust/ios-device/libminimuxer-ios.a
            apps/ios/Sources/Litter/Generated/Minimuxer
            apps/ios/GeneratedRust/Headers/Minimuxer
            ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework
            ThirdParty/SideStore/minimuxer/generated
            ThirdParty/SideStore/minimuxer/target/libminimuxer-ios.a
            ~/.cargo/bin/bindgen
          key: ios-minimuxer-bridge-v1-${{ runner.os }}-xcode26-ios18-${{ hashFiles('tools/scripts/build-sidestore-minimuxer.sh', 'ThirdParty/SideStore/minimuxer/Cargo.lock', 'ThirdParty/SideStore/minimuxer/Cargo.toml', 'ThirdParty/SideStore/minimuxer/src/**', 'ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/Cargo.lock', 'ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/Cargo.toml', 'ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/src/**') }}

      - name: Check KittyStore minimuxer bridge cache
        id: minimuxer_bridge_prebuilt
        run: |
          set -euo pipefail
          if [ "${{ steps.minimuxer_bridge_cache.outputs.cache-hit }}" != "true" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No exact KittyStore minimuxer bridge cache hit."
            exit 0
          fi

          missing=0
          require_nonempty() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "Missing cached minimuxer output: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }
          require_nonempty apps/ios/GeneratedRust/ios-device/libminimuxer-ios.a
          require_nonempty apps/ios/Sources/Litter/Generated/Minimuxer/SwiftBridgeCore.generated.swift
          require_nonempty apps/ios/Sources/Litter/Generated/Minimuxer/minimuxer.generated.swift
          require_nonempty apps/ios/Sources/Litter/Generated/Minimuxer/minimuxer-helpers.generated.swift
          require_nonempty apps/ios/GeneratedRust/Headers/Minimuxer/SwiftBridgeCore.h
          require_nonempty apps/ios/GeneratedRust/Headers/Minimuxer/minimuxer.h
          require_nonempty apps/ios/GeneratedRust/Headers/Minimuxer/minimuxer-Bridging-Header.h
          require_nonempty apps/ios/GeneratedRust/Headers/Minimuxer/module.modulemap
          require_nonempty ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework/ios-arm64/librust_bridge.a
          if ! grep -q "startWithLogger" apps/ios/Sources/Litter/Generated/Minimuxer/minimuxer.generated.swift; then
            echo "Cached minimuxer Swift bridge is stale: missing startWithLogger."
            missing=1
          fi
          if ! grep -q "installIpa" apps/ios/Sources/Litter/Generated/Minimuxer/minimuxer.generated.swift; then
            echo "Cached minimuxer Swift bridge is stale: missing installIpa."
            missing=1
          fi
          if [ "$missing" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using cached KittyStore minimuxer bridge outputs."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cached KittyStore minimuxer bridge outputs are incomplete; rebuilding."
          fi

      - name: Install KittyStore minimuxer rebuild dependencies
        if: steps.minimuxer_bridge_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list pkgconf >/dev/null 2>&1 || brew install pkgconf
          brew list llvm >/dev/null 2>&1 || brew install llvm

      - name: Build KittyStore minimuxer bridge
        if: steps.minimuxer_bridge_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          time tools/scripts/build-sidestore-minimuxer.sh

      - name: Save KittyStore minimuxer bridge cache
        if: steps.minimuxer_bridge_cache.outputs.cache-hit != 'true' && steps.minimuxer_bridge_prebuilt.outputs.available != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            apps/ios/GeneratedRust/ios-device/libminimuxer-ios.a
            apps/ios/Sources/Litter/Generated/Minimuxer
            apps/ios/GeneratedRust/Headers/Minimuxer
            ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework
            ThirdParty/SideStore/minimuxer/generated
            ThirdParty/SideStore/minimuxer/target/libminimuxer-ios.a
            ~/.cargo/bin/bindgen
          key: ${{ steps.minimuxer_bridge_cache.outputs.cache-primary-key }}

      - name: Restore emexDE CoreCompiler artifact cache
        id: emexde_corecompiler_cache
        uses: actions/cache/restore@v4
        with:
          path: ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs
          key: ios-emexde-corecompiler-artifacts-v1-${{ runner.os }}-${{ hashFiles('tools/scripts/prepare-emexde-corecompiler-artifacts.sh', 'ThirdParty/EmexDE/Source/CoreCompiler/**/*.h', 'ThirdParty/EmexDE/Source/CoreCompiler/**/*.m', 'ThirdParty/EmexDE/Source/CoreCompiler/**/*.mm', 'ThirdParty/EmexDE/Source/CoreCompiler/**/*.swift') }}

      - name: Check emexDE CoreCompiler artifact cache
        id: emexde_corecompiler_prebuilt
        run: |
          set -euo pipefail
          support_source="ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs"
          if [ "${{ steps.emexde_corecompiler_cache.outputs.cache-hit }}" != "true" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No exact emexDE CoreCompiler artifact cache hit."
            exit 0
          fi
          missing=0
          require_nonempty() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "Missing cached CoreCompiler artifact: $path"
              missing=1
            else
              ls -lh "$path"
            fi
          }
          require_nonempty "$support_source/LLVM.xcframework/ios-arm64/llvm.a"
          require_nonempty "$support_source/LLVM.xcframework/ios-arm64/Headers/llvm/Support/Threading.h"
          swift_header_root="$support_source/LLVM.xcframework/ios-arm64/Headers"
          swift_header_marker="$swift_header_root/swift/.emexde-swift-header-branch"
          require_nonempty "$swift_header_root/swift/Basic/InitializeSwiftModules.h"
          require_nonempty "$swift_header_root/swift/FrontendTool/FrontendTool.h"
          require_nonempty "$swift_header_root/swift/Config.h"
          require_nonempty "$swift_header_root/clang/Basic/PathRemapper.h"
          require_nonempty "$swift_header_root/clang/CAS/CASOptions.h"
          require_nonempty "$swift_header_root/llvm/CAS/ActionCache.h"
          require_nonempty "$swift_header_root/llvm/Support/VirtualOutputBackend.h"
          require_nonempty "$swift_header_root/swift/Option/Options.inc"
          require_nonempty "$swift_header_root/swift/Runtime/CMakeConfig.h"
          require_nonempty "$swift_header_root/lld/Common/Version.inc"
          require_nonempty "$swift_header_marker"
          if [ -s "$swift_header_marker" ] && [ "$(cat "$swift_header_marker")" != "swift-6.0.3-RELEASE" ]; then
            echo "Cached Swift compiler header overlay is for $(cat "$swift_header_marker"), expected swift-6.0.3-RELEASE."
            missing=1
          fi
          if [ -s "$swift_header_root/swift/AST/Identifier.h" ] && grep -q 'getTrailingObjects(NumArgs)' "$swift_header_root/swift/AST/Identifier.h"; then
            echo "Cached Swift compiler headers use the newer TrailingObjects API and are incompatible with vendored LLVM 19."
            missing=1
          fi
          if [ -f "$swift_header_root/module.modulemap" ]; then
            echo "Cached Swift root module map conflicts with Xcode public header copy."
            missing=1
          fi
          if ! find "$support_source" -maxdepth 1 -type f -name 'lib_Compiler*.dylib' -print -quit | grep -q .; then
            echo "Cached CoreCompiler support dylibs are missing."
            missing=1
          fi
          if [ "$missing" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using cached emexDE CoreCompiler support artifacts."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cached emexDE CoreCompiler artifacts are incomplete; rebuilding."
          fi

      - name: Prepare emexDE CoreCompiler artifacts
        if: steps.emexde_corecompiler_prebuilt.outputs.available != 'true'
        run: |
          set -euo pipefail
          time tools/scripts/prepare-emexde-corecompiler-artifacts.sh

      - name: Save emexDE CoreCompiler artifact cache
        if: steps.emexde_corecompiler_cache.outputs.cache-hit != 'true' && steps.emexde_corecompiler_prebuilt.outputs.available != 'true'
        uses: actions/cache/save@v4
        with:
          path: ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs
          key: ${{ steps.emexde_corecompiler_cache.outputs.cache-primary-key }}

      - name: Normalize emexDE generated Swift imports
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changed = []
          for source in Path("ThirdParty/EmexDE/Source").rglob("*"):
              if source.suffix not in {".h", ".m", ".mm", ".cpp", ".hpp"}:
                  continue
              text = source.read_text(errors="ignore")
              normalized = text.replace("#import <emexDE-Swift.h>", '#import "emexDE-Swift.h"')
              if normalized != text:
                  source.write_text(normalized)
                  changed.append(source)

          terminal_bridge = Path("ThirdParty/EmexDE/Source/Nyxian/UI/UIInit/Terminal.swift")
          bridge_text = terminal_bridge.read_text()
          bridge_replacements = {
              "@objc protocol TerminalViewDelegateObjC: AnyObject": "@objc(TerminalViewDelegateObjC) public protocol TerminalViewDelegateObjC: AnyObject",
              "@objc class TerminalViewObjC: TerminalView": "@objc(TerminalViewObjC) public class TerminalViewObjC: TerminalView",
              "@objc var ttyHandle: FileHandle?": "@objc public var ttyHandle: FileHandle?",
              "required init?(coder: NSCoder)": "public required init?(coder: NSCoder)",
              "override func willMove(toWindow newWindow: UIWindow?)": "public override func willMove(toWindow newWindow: UIWindow?)",
              "@objc func handleThemeChange(_ notification: Notification?)": "@objc public func handleThemeChange(_ notification: Notification?)",
              "override func traitCollectionDidChange(_ previousTraitCollection: UITraitCollection?)": "public override func traitCollectionDidChange(_ previousTraitCollection: UITraitCollection?)",
          }
          for before, after in bridge_replacements.items():
              if before not in bridge_text and after not in bridge_text:
                  raise SystemExit(f"Missing expected emexDE terminal bridge declaration: {before}")
              bridge_text = bridge_text.replace(before, after)
          terminal_bridge.write_text(bridge_text)

          terminal_session = Path("ThirdParty/EmexDE/Source/Nyxian/LindChain/WindowServer/Session/NXWindowSessionTerminal.m")
          terminal_session_text = terminal_session.read_text()
          terminal_session_shim = "\n".join([
              "#import <UIKit/UIKit.h>",
              "@class TerminalView;",
              "@protocol TerminalViewDelegateObjC <NSObject>",
              "@end",
              "@interface TerminalViewObjC : UIView",
              "@property (nonatomic, weak, nullable) id<TerminalViewDelegateObjC> objcDelegate;",
              "@property (nonatomic, strong, nullable) NSFileHandle *ttyHandle;",
              "- (nonnull instancetype)initWithFrame:(CGRect)frame masterFD:(int32_t)masterFD;",
              "@end",
          ])
          if '#import "emexDE-Swift.h"' not in terminal_session_text and terminal_session_shim not in terminal_session_text:
              raise SystemExit("Missing expected emexDE terminal session Swift import")
          terminal_session_text = terminal_session_text.replace('#import "emexDE-Swift.h"', terminal_session_shim)
          terminal_session.write_text(terminal_session_text)

          os_version_bridge = Path("ThirdParty/EmexDE/Source/Nyxian/UI/FileList/iOSVersionPickerView.swift")
          os_version_text = os_version_bridge.read_text()
          os_version_replacements = {
              "@objc class NXOSVersion: NSObject, Comparable": "@objc(NXOSVersion) public class NXOSVersion: NSObject, Comparable",
              "@objc let versionString: String": "@objc public let versionString: String",
              "@objc let versionNumeric: Double": "@objc public let versionNumeric: Double",
              "@objc private(set) var pickerVersionString: String": "@objc public private(set) var pickerVersionString: String",
              "@objc static let hostVersion: NXOSVersion": "@objc public static let hostVersion: NXOSVersion",
              "@objc static var minimumBuildVersion: NXOSVersion": "@objc public static var minimumBuildVersion: NXOSVersion",
              "@objc static var maximumBuildVersion: NXOSVersion": "@objc public static var maximumBuildVersion: NXOSVersion",
              "@objc static var iPadOSMinimumValidityVersion: NXOSVersion": "@objc public static var iPadOSMinimumValidityVersion: NXOSVersion",
              "@objc init?(versionString inputString: String?)": "@objc public init?(versionString inputString: String?)",
              "@objc override convenience init()": "@objc public override convenience init()",
              "static func == (lhs: NXOSVersion, rhs: NXOSVersion) -> Bool": "public static func == (lhs: NXOSVersion, rhs: NXOSVersion) -> Bool",
              "static func < (lhs: NXOSVersion, rhs: NXOSVersion) -> Bool": "public static func < (lhs: NXOSVersion, rhs: NXOSVersion) -> Bool",
              "@objc override var description: String": "@objc public override var description: String",
              "@objc override func isEqual(_ object: Any?) -> Bool": "@objc public override func isEqual(_ object: Any?) -> Bool",
              "@objc override var hash: Int": "@objc public override var hash: Int",
          }
          for before, after in os_version_replacements.items():
              if before not in os_version_text and after not in os_version_text:
                  raise SystemExit(f"Missing expected emexDE NXOSVersion declaration: {before}")
              os_version_text = os_version_text.replace(before, after)
          os_version_bridge.write_text(os_version_text)

          notification_bridge = Path("ThirdParty/EmexDE/Source/Nyxian/LindChain/Project/Project+NotificationServer.swift")
          notification_text = notification_bridge.read_text()
          notification_replacements = {
              "@objc class NotificationServer: NSObject": "@objc(NotificationServer) public class NotificationServer: NSObject",
              "@objc enum NotifLevel: Int": "@objc public enum NotifLevel: Int",
              "@objc static func NotifyUser(": "@objc public static func NotifyUser(",
          }
          for before, after in notification_replacements.items():
              if before not in notification_text and after not in notification_text:
                  raise SystemExit(f"Missing expected emexDE notification bridge declaration: {before}")
              notification_text = notification_text.replace(before, after)
          notification_bridge.write_text(notification_text)

          application_management_bridge = Path("ThirdParty/EmexDE/Source/Nyxian/UI/Settings/ApplicationManagement.swift")
          application_management_text = application_management_bridge.read_text()
          application_management_before = "class ApplicationManagementViewController: UIThemedTableViewController, UITextFieldDelegate, UIDocumentPickerDelegate, UIAdaptivePresentationControllerDelegate"
          application_management_after = "@objc(ApplicationManagementViewController) class ApplicationManagementViewController: UIThemedTableViewController, UITextFieldDelegate, UIDocumentPickerDelegate, UIAdaptivePresentationControllerDelegate"
          if application_management_before not in application_management_text and application_management_after not in application_management_text:
              raise SystemExit("Missing expected emexDE ApplicationManagementViewController declaration")
          application_management_bridge.write_text(application_management_text.replace(application_management_before, application_management_after))

          def replace_generated_swift_import(source_path, shim, label):
              source = Path(source_path)
              source_text = source.read_text()
              marker = '#import "emexDE-Swift.h"'
              if marker not in source_text:
                  if shim and shim in source_text:
                      return
                  if not shim:
                      return
                  raise SystemExit(f"Missing expected emexDE Swift import for {label}")
              source.write_text(source_text.replace(marker, shim))

          notification_objc_shim = "\n".join([
              "#import <Foundation/Foundation.h>",
              "typedef NS_ENUM(NSInteger, NotifLevel) {",
              "    NotifLevelNote = 0,",
              "    NotifLevelWarning = 1,",
              "    NotifLevelError = 2,",
              "};",
              "@interface NotificationServer : NSObject",
              "+ (void)NotifyUserWithLevel:(NotifLevel)level notification:(NSString *)notification delay:(double)delay;",
              "@end",
          ])
          nxos_version_objc_shim = "\n".join([
              "#import <Foundation/Foundation.h>",
              "#import <NXBootstrap.h>",
              "@interface NXOSVersion : NSObject",
              "+ (NXOSVersion *)hostVersion;",
              "+ (NXOSVersion *)maximumBuildVersion;",
              "@property (nonatomic, readonly, copy) NSString *versionString;",
              "@property (nonatomic, readonly, copy) NSString *pickerVersionString;",
              "@end",
          ])
          application_management_objc_shim = "\n".join([
              "#import <Foundation/Foundation.h>",
              "@class LDEApplicationObject;",
              "@interface ApplicationManagementViewController : NSObject",
              "+ (instancetype)shared;",
              "- (void)applicationWasInstalled:(LDEApplicationObject *)app;",
              "- (void)applicationWithBundleIdentifierWasUninstalled:(NSString *)bundleIdentifier;",
              "@end",
          ])
          replace_generated_swift_import(
              "ThirdParty/EmexDE/Source/Nyxian/NXBootstrap.m",
              notification_objc_shim,
              "NXBootstrap notification bridge",
          )
          replace_generated_swift_import(
              "ThirdParty/EmexDE/Source/Nyxian/LindChain/ProcEnvironment/Process/PEProcessManager.m",
              notification_objc_shim,
              "PEProcessManager notification bridge",
          )
          replace_generated_swift_import(
              "ThirdParty/EmexDE/Source/Nyxian/LindChain/Project/NXTarget.m",
              nxos_version_objc_shim,
              "NXTarget OS version bridge",
          )
          replace_generated_swift_import(
              "ThirdParty/EmexDE/Source/Nyxian/LindChain/Project/NXProject.m",
              nxos_version_objc_shim,
              "NXProject OS version bridge",
          )
          replace_generated_swift_import(
              "ThirdParty/EmexDE/Source/LiveProcess/LindChain/Services/applicationmgmtd/LDEApplicationWorkspace.m",
              application_management_objc_shim,
              "LDEApplicationWorkspace application-management bridge",
          )
          replace_generated_swift_import(
              "ThirdParty/EmexDE/Source/Nyxian/LindChain/JBSupport/Shell.m",
              "",
              "Shell unused Swift import",
          )

          cc_driver = Path("ThirdParty/EmexDE/Source/CoreCompiler/Tools/CCDriver.cpp")
          cc_driver_text = cc_driver.read_text()
          cc_driver_before = '        case CCDriverTypeSwift:\n        {\n            if(!driver->swiftCompilation)\n            {\n                return nullptr;\n            }\n            const auto &Args = driver->swiftCompilation->getArgs();\n            if(const llvm::opt::Arg *A = Args.getLastArg(swift::options::OPT_sdk))\n            {\n                cxxstr = A->getValue();\n            }\n            break;\n        }\n'
          cc_driver_after = '        case CCDriverTypeSwift:\n        {\n            for(size_t i = 0; i + 1 < driver->argStorage.size(); ++i)\n            {\n                if(driver->argStorage[i] == "-sdk")\n                {\n                    cxxstr = driver->argStorage[i + 1];\n                    break;\n                }\n            }\n            break;\n        }\n'
          if cc_driver_before not in cc_driver_text and cc_driver_after not in cc_driver_text:
              raise SystemExit("Missing expected CoreCompiler Swift SDK lookup block")
          cc_driver.write_text(cc_driver_text.replace(cc_driver_before, cc_driver_after))

          print(f"Normalized {len(changed)} emexDE generated Swift imports.")
          for source in changed:
              print(source)
          print("Exposed emexDE Swift bridge declarations for generated ObjC headers.")
          PY

      - name: Patch emexDE CoreCompiler Swift frontend for unsigned CI
        run: |
          set -euo pipefail
          python3 tools/scripts/patch-emexde-corecompiler-for-ios-ci.py

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          time make xcgen

      - name: Build unsigned archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$PWD/build/Litter.xcarchive"
          rm -rf "$ARCHIVE_PATH" build/unsigned-ipa Payload
          mkdir -p build
          BASE_MARKETING_VERSION="$(python3 - <<'PY'
          import re
          from pathlib import Path

          match = re.search(r'^\s*MARKETING_VERSION:\s*"?([^"\s]+)"?', Path("apps/ios/project.yml").read_text(), re.M)
          print(match.group(1) if match else "1.5.0")
          PY
          )"
          MARKETING_VERSION="$(python3 - "$BASE_MARKETING_VERSION" <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          base = sys.argv[1].strip()
          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", base)
          if not match:
              raise SystemExit(f"::error::Base MARKETING_VERSION must be major.minor.patch, got {base!r}")

          major, minor, patch = match.groups()
          latest_patch = int(patch)
          repo = os.environ["GITHUB_REPOSITORY"]

          try:
              with tempfile.TemporaryDirectory() as temp_dir:
                  subprocess.run(
                      [
                          "gh", "release", "download", "app-source",
                          "--pattern", "litter-update.json",
                          "--dir", temp_dir,
                          "--clobber",
                          "--repo", repo,
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
                  stable = json.loads((Path(temp_dir) / "litter-update.json").read_text())
              stable_version = str(stable.get("version", "")).strip()
              stable_match = re.fullmatch(rf"{major}\.{minor}\.(\d+)", stable_version)
              if stable_match:
                  latest_patch = max(latest_patch, int(stable_match.group(1)))
              elif stable_version:
                  print(f"Stable update feed is on {stable_version}; using {base} as the {major}.{minor}.x base", file=sys.stderr)
          except Exception as error:
              print(f"Could not inspect stable Litter app-source release ({error}); using {base} as the version base", file=sys.stderr)

          print(f"{major}.{minor}.{latest_patch + 1}")
          PY
          )"
          xcodebuild archive \
            -project apps/ios/Litter.xcodeproj \
            -scheme Litter \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            2>&1 | tee build/xcodebuild-archive.log

          if grep -F "was built for newer 'iOS' version" build/xcodebuild-archive.log; then
            echo "::error::A linked object was built for a newer iOS deployment target than Litter. Rebuild the vendored static libraries with LITTER_MINIMUXER_MIN_IOS=18.0." >&2
            exit 1
          fi
          if awk '/\/Applications\/Litter\.app\/Litter/ && /-lminimuxer-ios/ { found = 1 } END { exit found ? 0 : 1 }' build/xcodebuild-archive.log; then
            echo "::error::Litter main executable links the KittyStore minimuxer static library; keep minimuxer isolated to the embedded KittyStore framework." >&2
            exit 1
          fi

      - name: Verify embedded dynamic frameworks
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Litter.xcarchive/Products/Applications -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No archived .app found for dynamic framework verification" >&2
            exit 1
          fi
          EXECUTABLE="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")"
          missing=0
          scan_binary() {
            local binary="$1"
            if [ ! -f "$binary" ]; then
              return 0
            fi
            if ! /usr/bin/file "$binary" | /usr/bin/grep -q 'Mach-O'; then
              return 0
            fi
            while IFS= read -r dependency; do
              local framework
              local dependency_binary
              framework="$(printf '%s\n' "$dependency" | /usr/bin/sed -E 's#^@rpath/([^/]+\.framework)/.*#\1#')"
              dependency_binary="$(/usr/bin/basename "$dependency")"
              if [ ! -f "$APP_PATH/Frameworks/$framework/$dependency_binary" ]; then
                echo "::error::$(basename "$binary") links $dependency but $APP_PATH/Frameworks/$framework/$dependency_binary is missing" >&2
                missing=1
              else
                echo "Verified embedded framework for $(basename "$binary"): $framework/$dependency_binary"
              fi
            done < <(/usr/bin/otool -L "$binary" | /usr/bin/awk 'NR > 1 { print $1 }' | /usr/bin/grep '^@rpath/.*\.framework/' || true)
          }
          verify_ios_minos() {
            local binary="$1"
            if [ ! -f "$binary" ]; then
              return 0
            fi
            if ! /usr/bin/file "$binary" | /usr/bin/grep -q 'Mach-O'; then
              return 0
            fi
            if [ ! -x /usr/bin/vtool ]; then
              echo "::warning::vtool is unavailable; skipping iOS minOS verification for $binary" >&2
              return 0
            fi
            local minos
            minos="$(/usr/bin/vtool -show-build "$binary" 2>/dev/null | /usr/bin/awk 'tolower($1) == "platform" && $2 == "IOS" { ios = 1 } ios && $1 == "minos" { print $2; exit }')"
            if [ -z "$minos" ]; then
              return 0
            fi
            python3 - "$minos" "$binary" <<'PY'
          import sys

          minos = sys.argv[1]
          binary = sys.argv[2]

          def version(value):
              parts = [int(part) for part in value.split('.')]
              return tuple((parts + [0, 0, 0])[:3])

          if version(minos) > version('18.0'):
              print(f"::error::{binary} has iOS minOS {minos}; launch-linked KittyStore binaries must stay at iOS 18.0 or lower.", file=sys.stderr)
              sys.exit(1)
          PY
          }
          scan_binary "$APP_PATH/$EXECUTABLE"
          for forbidden_dependency in \
            '@rpath/Minimuxer.framework/Minimuxer' \
            '@rpath/RustBridge.framework/RustBridge'
          do
            if /usr/bin/otool -L "$APP_PATH/$EXECUTABLE" | /usr/bin/grep -Fq "$forbidden_dependency"; then
              echo "::error::Litter directly launch-links $forbidden_dependency; keep minimuxer isolated behind the KittyStore framework." >&2
              /usr/bin/otool -L "$APP_PATH/$EXECUTABLE" >&2
              exit 1
            fi
          done
          if ! /usr/bin/otool -L "$APP_PATH/$EXECUTABLE" | /usr/bin/grep -Fq '@rpath/SideStore.framework/SideStore'; then
            echo "::error::Litter no longer launch-links SideStore.framework; this regresses the 1.5.52 KittyStore launch path." >&2
            /usr/bin/otool -L "$APP_PATH/$EXECUTABLE" >&2
            exit 1
          fi
          if [ ! -f "$APP_PATH/Frameworks/SideStore.framework/SideStore" ]; then
            echo "::error::Litter IPA is missing embedded SideStore.framework for KittyStore launch." >&2
            exit 1
          fi
          echo "Verified KittyStore framework is embedded, launch-linked by Litter, and minimuxer native frameworks are not directly launch-linked by Litter."
          require_any_resource() {
            local label="$1"
            shift
            local candidate
            for candidate in "$@"; do
              if [ -e "$candidate" ]; then
                echo "Verified KittyStore resource: $label -> $candidate"
                return 0
              fi
            done
            echo "::error::Missing KittyStore resource: $label" >&2
            printf '%s\n' 'Checked paths:' >&2
            for candidate in "$@"; do
              printf '  %s\n' "$candidate" >&2
            done
            missing=1
          }
          SIDE_FRAMEWORK="$APP_PATH/Frameworks/SideStore.framework"
          CORE_FRAMEWORK="$APP_PATH/Frameworks/AltStoreCore.framework"
          require_any_resource "Main storyboard" "$SIDE_FRAMEWORK/Base.lproj/Main.storyboardc" "$SIDE_FRAMEWORK/Main.storyboardc"
          require_any_resource "Authentication storyboard" "$SIDE_FRAMEWORK/Authentication.storyboardc"
          require_any_resource "Settings storyboard" "$SIDE_FRAMEWORK/Settings.storyboardc"
          require_any_resource "Sources storyboard" "$SIDE_FRAMEWORK/Sources.storyboardc"
          require_any_resource "AppBannerView nib" "$SIDE_FRAMEWORK/AppBannerView.nib"
          require_any_resource "UpdateCollectionViewCell nib" "$SIDE_FRAMEWORK/UpdateCollectionViewCell.nib"
          require_any_resource "InstalledAppsCollectionHeaderView nib" "$SIDE_FRAMEWORK/InstalledAppsCollectionHeaderView.nib"
          require_any_resource "NewsCollectionViewCell nib" "$SIDE_FRAMEWORK/NewsCollectionViewCell.nib"
          require_any_resource "SettingsHeaderFooterView nib" "$SIDE_FRAMEWORK/SettingsHeaderFooterView.nib"
          require_any_resource "AboutPatreonHeaderView nib" "$SIDE_FRAMEWORK/AboutPatreonHeaderView.nib"
          require_any_resource "SourceHeaderView nib" "$SIDE_FRAMEWORK/SourceHeaderView.nib"
          require_any_resource "SideStore asset catalog" "$SIDE_FRAMEWORK/Assets.car"
          require_any_resource "AltIcons manifest" "$SIDE_FRAMEWORK/AltIcons.plist"
          require_any_resource "Release entitlements" "$SIDE_FRAMEWORK/ReleaseEntitlements.plist"
          require_any_resource "Silence audio" "$SIDE_FRAMEWORK/Silence.m4a"
          require_any_resource "AltStoreCore Core Data model" "$CORE_FRAMEWORK/AltStore.momd"
          require_any_resource "AltStoreCore permissions manifest" "$CORE_FRAMEWORK/Permissions.plist"
          verify_ios_minos "$APP_PATH/$EXECUTABLE"
          verify_ios_minos "$APP_PATH/Frameworks/SideStore.framework/SideStore"
          verify_ios_minos "$APP_PATH/Frameworks/Minimuxer.framework/Minimuxer"
          verify_ios_minos "$APP_PATH/Frameworks/RustBridge.framework/RustBridge"
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework_dir in "$APP_PATH"/Frameworks/*.framework; do
              if [ -d "$framework_dir" ]; then
                framework_name="$(/usr/bin/basename "$framework_dir" .framework)"
                scan_binary "$framework_dir/$framework_name"
              fi
            done
            while IFS= read -r dylib; do
              scan_binary "$dylib"
            done < <(find "$APP_PATH/Frameworks" -maxdepth 1 -type f -name '*.dylib' -print)
          fi
          if [ "$missing" -ne 0 ]; then
            find "$APP_PATH/Frameworks" -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi
      - name: Restore Nyxian SwiftPM package cache
        id: nyxian_swiftpm_cache
        if: env.LITTER_NYXIAN_PRIVATE_BUILD == '1'
        uses: actions/cache/restore@v4
        with:
          path: build/NyxianSourcePackages
          key: ios-nyxian-swiftpm-v1-${{ runner.os }}-${{ hashFiles('ThirdParty/Nyxian/Nyxian.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ios-nyxian-swiftpm-v1-${{ runner.os }}-

      - name: Build Nyxian LiveProcess extension
        if: env.LITTER_NYXIAN_PRIVATE_BUILD == '1'
        run: |
          set -euo pipefail
          BUILD_ROOT="$PWD/build/NyxianLiveProcess"
          OUTPUT_ROOT="$PWD/build/nyxian-liveprocess"
          SOURCE_PACKAGES="$PWD/build/NyxianSourcePackages"
          rm -rf "$BUILD_ROOT" "$OUTPUT_ROOT"
          mkdir -p "$BUILD_ROOT" "$OUTPUT_ROOT" "$SOURCE_PACKAGES"

          xcodebuild_with_retry() {
            local label="$1"
            local attempt=1
            local status=0
            shift

            while [ "$attempt" -le 3 ]; do
              echo "==> $label (attempt $attempt/3)"
              "$@" && return 0
              status=$?
              if [ "$attempt" -eq 3 ]; then
                echo "::error::$label failed after 3 attempts with exit code $status" >&2
                return "$status"
              fi
              echo "$label failed with exit code $status; retrying after $((attempt * 20)) seconds" >&2
              sleep $((attempt * 20))
              attempt=$((attempt + 1))
            done
          }

          # LiveProcess.xcscheme comes from upstream and points at LiveContainer.xcodeproj.
          # Resolve packages through the valid app scheme, then build the extension target directly.
          xcodebuild_with_retry "Resolve Nyxian SwiftPM dependencies" \
            xcodebuild -resolvePackageDependencies \
              -project ThirdParty/Nyxian/Nyxian.xcodeproj \
              -scheme Nyxian \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES"

          xcodebuild_with_retry "Build Nyxian LiveProcess extension" \
            xcodebuild build \
              -project ThirdParty/Nyxian/Nyxian.xcodeproj \
              -target LiveProcess \
              -configuration Release \
              -sdk iphoneos \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES" \
              SYMROOT="$BUILD_ROOT/Build/Products" \
              OBJROOT="$BUILD_ROOT/Build/Intermediates" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              PRODUCT_BUNDLE_IDENTIFIER="com.sigkitten.litter.LiveProcess" \
              CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}"

          LIVEPROCESS_APPEX="$(find "$BUILD_ROOT" -type d -name 'LiveProcess.appex' -print | head -n 1)"
          if [ -z "$LIVEPROCESS_APPEX" ] || [ ! -d "$LIVEPROCESS_APPEX" ]; then
            echo "::error::Nyxian LiveProcess.appex was not produced" >&2
            find "$BUILD_ROOT" -maxdepth 6 -print >&2 || true
            exit 1
          fi

          cp -R "$LIVEPROCESS_APPEX" "$OUTPUT_ROOT/LiveProcess.appex"
          /usr/libexec/PlistBuddy -c 'Print :NSExtension' "$OUTPUT_ROOT/LiveProcess.appex/Info.plist" >/dev/null
          echo "Nyxian LiveProcess extension staged at $OUTPUT_ROOT/LiveProcess.appex"

      - name: Save Nyxian SwiftPM package cache
        if: env.LITTER_NYXIAN_PRIVATE_BUILD == '1' && steps.nyxian_swiftpm_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/NyxianSourcePackages
          key: ${{ steps.nyxian_swiftpm_cache.outputs.cache-primary-key }}

      - name: Verify archived BuildKit asset payload
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS == '1'
        run: |
          set -euo pipefail
          export LITTER_BUILDKIT_EXPECT_NATIVE_SOURCE_FINGERPRINT="${{ steps.buildkit_fingerprint.outputs.native_source_fingerprint }}"
          APP_PATH="$(find build/Litter.xcarchive/Products/Applications -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in archive" >&2
            exit 1
          fi

          ASSET_ZIP="$APP_PATH/LitterBuildKitAssets.zip"
          if [ ! -s "$ASSET_ZIP" ]; then
            echo "::error::Archived app is missing LitterBuildKitAssets.zip" >&2
            find "$APP_PATH" -maxdepth 2 -name '*BuildKit*' -print >&2 || true
            exit 1
          fi
          if [ -d "$APP_PATH/BuildKitAssets" ]; then
            echo "::error::Archived app contains expanded BuildKitAssets; SDK payload must stay inside LitterBuildKitAssets.zip" >&2
            exit 1
          fi
          if find "$APP_PATH" -path "$APP_PATH/Frameworks" -prune -o -path '*/BuildKitAssets/SDK/*' -print -quit | grep -q .; then
            echo "::error::Archived app contains expanded BuildKit SDK payload outside LitterBuildKitAssets.zip" >&2
            exit 1
          fi

          if [ ! -d "$APP_PATH/Frameworks/CoreCompiler.framework" ]; then
            echo "::error::Archived app is missing embedded CoreCompiler.framework" >&2
            exit 1
          fi
          if [ -d "$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompilerSupportLibs" ]; then
            echo "::error::CoreCompilerSupportLibs must be embedded as signable app Frameworks dylibs, not nested inside CoreCompiler.framework" >&2
            exit 1
          fi
          if find "$APP_PATH/Frameworks" -path '*SDK/iPhoneOS*.sdk*' -print -quit | grep -q .; then
            echo "::error::Embedded Frameworks contain SDK payload files" >&2
            exit 1
          fi

          if [ ! -d "$APP_PATH/Frameworks/LitterBuildKitNative.framework" ]; then
            echo "::error::Archived app is missing embedded LitterBuildKitNative.framework" >&2
            exit 1
          fi

          if ! find "$APP_PATH/Frameworks" -maxdepth 1 -type f \( -name 'lib_Compiler*.dylib' -o -name 'libLLVM*.dylib' -o -name 'libllvm*.dylib' \) -print -quit | grep -q .; then
            echo "::error::Archived app is missing embedded CoreCompiler support dylibs" >&2
            exit 1
          fi

          DRIVER="$APP_PATH/Frameworks/LitterBuildKitNative.framework/LitterBuildKitNative"
          CORE="$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompiler"
          for binary in "$DRIVER" "$CORE"; do
            if [ ! -f "$binary" ]; then
              echo "::error::Archived app is missing embedded executable: $binary" >&2
              if [ -f "$binary.tbd" ]; then
                echo "::error::Found $binary.tbd instead of a signable executable; rebuild the BuildKit asset pack from the real framework product." >&2
              fi
              exit 1
            fi
          done
          verify_code_signature() {
            binary="$1"
            signature_info="$(/usr/bin/codesign -dv --verbose=4 "$binary" 2>&1)" || {
              echo "::error::$binary is not code signed" >&2
              printf '%s\n' "$signature_info" >&2
              exit 1
            }
            if ! printf '%s\n' "$signature_info" | grep -Eq 'CDHash=|CodeDirectory'; then
              echo "::error::$binary is missing a code directory/CDHash" >&2
              printf '%s\n' "$signature_info" >&2
              exit 1
            fi
          }
          verify_code_signature "$DRIVER"
          verify_code_signature "$CORE"
          if ! /usr/bin/nm -gU "$DRIVER" | awk '{print $NF}' | grep -qx '_litter_buildkit_run_json'; then
            echo "::error::Embedded LitterBuildKitNative.framework does not export litter_buildkit_run_json" >&2
            exit 1
          fi

          is_buildkit_support_dylib_name() {
            case "$1" in
              lib_Compiler*.dylib|libLLVM*.dylib|libllvm*.dylib) return 0 ;;
              *) return 1 ;;
            esac
          }
          is_macho_stub_dylib() {
            /usr/bin/file "$1" 2>/dev/null | grep -Eiq 'Mach-O.*stub|stub.*Mach-O'
          }
          has_usable_frameworks_rpath() {
            binary="$1"
            rpath="$2"
            /usr/bin/otool -l "$binary" | grep -F -q "$rpath" || \
              /usr/bin/otool -l "$binary" | grep -F -q '@executable_path/Frameworks'
          }
          verify_rpath() {
            binary="$1"
            rpath="$2"
            if ! has_usable_frameworks_rpath "$binary" "$rpath"; then
              echo "::error::$binary lacks a usable Frameworks rpath" >&2
              exit 1
            fi
          }
          buildkit_expected_install_name() {
            binary="$1"
            parent="$(basename "$(dirname "$binary")")"
            base="$(basename "$binary")"
            case "$parent/$base" in
              CoreCompiler.framework/CoreCompiler|LitterBuildKitNative.framework/LitterBuildKitNative)
                printf '%s\n' "@rpath/$parent/$base"
                ;;
              *)
                if is_buildkit_support_dylib_name "$base"; then
                  printf '%s\n' "@rpath/$base"
                fi
                ;;
            esac
          }
          is_buildkit_corecompiler_reference() {
            case "$1" in
              *CoreCompiler.framework/CoreCompiler) return 0 ;;
              *) return 1 ;;
            esac
          }
          verify_buildkit_install_name() {
            binary="$1"
            expected="$(buildkit_expected_install_name "$binary")"
            if [ -z "$expected" ]; then
              return 0
            fi
            id="$(/usr/bin/otool -D "$binary" | awk 'NR == 2 { print $1 }')"
            if [ "$id" != "$expected" ]; then
              echo "::error::$binary has unexpected install name: $id" >&2
              echo "::error::Expected install name: $expected" >&2
              exit 1
            fi
          }
          verify_buildkit_dependencies_present() {
            binary="$1"
            /usr/bin/otool -L "$binary" | awk 'NR > 1 { print $1 }' | while IFS= read -r dependency; do
              base="$(basename "$dependency")"
              if is_buildkit_corecompiler_reference "$dependency"; then
                if [ "$dependency" != "@rpath/CoreCompiler.framework/CoreCompiler" ]; then
                  echo "::error::$binary links CoreCompiler without @rpath: $dependency" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
                if [ ! -f "$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompiler" ]; then
                  echo "::error::$binary links missing embedded CoreCompiler.framework/CoreCompiler" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
              elif is_buildkit_support_dylib_name "$base"; then
                if [ "$dependency" != "@rpath/$base" ]; then
                  echo "::error::$binary links compiler dylib without @rpath: $dependency" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
                if [ ! -f "$APP_PATH/Frameworks/$base" ]; then
                  echo "::error::$binary links missing embedded compiler dylib $base" >&2
                  /usr/bin/otool -L "$binary" >&2
                  exit 1
                fi
              fi
            done
          }
          check_buildkit_rpath() {
            binary="$1"
            rpath="$2"
            verify_buildkit_install_name "$binary"
            if /usr/bin/otool -L "$binary" | grep -Eq 'CoreCompiler\.framework/CoreCompiler|lib_Compiler|libLLVM|libllvm'; then
              verify_rpath "$binary" "$rpath"
            fi
            if /usr/bin/otool -L "$binary" | grep -Eq 'BuildKitAssets/(SDK|Toolchains)|SDK/iPhoneOS.*\.sdk/usr/lib|Documents/BuildKit|Toolchains/Nyxian'; then
              echo "::error::$binary still links SDK/BuildKit asset dylib paths" >&2
              /usr/bin/otool -L "$binary" >&2
              exit 1
            fi
            verify_buildkit_dependencies_present "$binary"
          }
          check_buildkit_rpath "$DRIVER" '@loader_path/..'
          check_buildkit_rpath "$CORE" '@loader_path/..'
          find "$APP_PATH/Frameworks" -maxdepth 1 -type f \( -name 'lib_Compiler*.dylib' -o -name 'libLLVM*.dylib' -o -name 'libllvm*.dylib' \) -print | while IFS= read -r library; do
            if is_macho_stub_dylib "$library"; then
              echo "::error::$library is a Mach-O stub dylib and must not be embedded" >&2
              exit 1
            fi
            verify_code_signature "$library"
            check_buildkit_rpath "$library" '@loader_path'
          done

          python3 - "$ASSET_ZIP" <<'PY'
          import json
          import os
          import pathlib
          import sys
          import zipfile

          zip_path = pathlib.Path(sys.argv[1])
          with zipfile.ZipFile(zip_path) as archive:
              names = set(archive.namelist())
              manifest_names = [name for name in names if name.endswith("manifest.json")]
              manifest_name = next((name for name in manifest_names if name.endswith("BuildKitAssets/manifest.json")), None)
              if manifest_name is None and manifest_names:
                  manifest_name = sorted(manifest_names)[0]
              if manifest_name is None:
                  print("::error::LitterBuildKitAssets.zip does not contain manifest.json")
                  sys.exit(1)

              prefix = manifest_name[:-len("manifest.json")]
              manifest = json.loads(archive.read(manifest_name).decode("utf-8"))
              toolchain = manifest.get("toolchain", {})
              required = list(manifest.get("requiredPaths", []))
              for key in ("coreCompilerFramework", "nativeDriverFramework", "supportLibraries", "sdkPath", "nativeRunner", "swiftResourceDir"):
                  value = toolchain.get(key)
                  if value:
                      required.append(value)
              swift_resource_dir = toolchain.get("swiftResourceDir") or "Toolchains/Nyxian/SwiftResourceDir"
              required.append(str(pathlib.Path(swift_resource_dir) / "iphoneos"))

              expected_native_fingerprint = os.environ.get("LITTER_BUILDKIT_EXPECT_NATIVE_SOURCE_FINGERPRINT") or ""
              actual_native_fingerprint = (
                  manifest.get("nativeDriverSourceFingerprint")
                  or (manifest.get("source") or {}).get("nativeDriverSourceFingerprint")
                  or ""
              )
              if expected_native_fingerprint:
                  if not actual_native_fingerprint:
                      print("::error::LitterBuildKitAssets.zip manifest is missing nativeDriverSourceFingerprint")
                      sys.exit(1)
                  if actual_native_fingerprint != expected_native_fingerprint:
                      print("::error::LitterBuildKitAssets.zip native driver source fingerprint mismatch")
                      print(f"expected={expected_native_fingerprint}")
                      print(f"actual={actual_native_fingerprint}")
                      sys.exit(1)

              def has_entry(relative):
                  relative = relative.strip("/")
                  exact = prefix + relative
                  directory = exact.rstrip("/") + "/"
                  return exact in names or directory in names or any(name.startswith(directory) for name in names)

              missing = []
              for relative in sorted(set(required)):
                  if not has_entry(relative):
                      missing.append(relative)

              sdk_path = toolchain.get("sdkPath") or "SDK/iPhoneOS26.4.sdk"
              sdk_settings = pathlib.PurePosixPath(sdk_path) / "SDKSettings.plist"
              if prefix + str(sdk_settings) not in names:
                  missing.append(str(sdk_settings))

              if missing:
                  print("::error::LitterBuildKitAssets.zip is incomplete:")
                  for item in missing:
                      print(f"- {item}")
                  sys.exit(1)

              print(f"Archived BuildKit assets verified: {manifest.get('bundleIdentifier', 'unknown')} SDK {manifest.get('sdkVersion', 'unknown')}")
          PY

      - name: Verify private BuildKit payload is external
        if: env.LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS != '1'
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Litter.xcarchive/Products/Applications -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in archive" >&2
            exit 1
          fi

          forbidden=0
          for item in             "$APP_PATH/LitterBuildKitAssets.zip"             "$APP_PATH/Frameworks/LitterBuildKitNative.framework"; do
            if [ -e "$item" ]; then
              echo "::error::Launch-safe IPA must not embed private BuildKit payload: $item" >&2
              forbidden=1
            fi
          done

          if [ ! -f "$APP_PATH/Frameworks/CoreCompiler.framework/CoreCompiler" ]; then
            echo "::error::Archived app is missing emexDE CoreCompiler.framework" >&2
            forbidden=1
          fi
          if ! find "$APP_PATH/Frameworks" -maxdepth 1 -type f -name 'lib_Compiler*.dylib' -print -quit | grep -q .; then
            echo "::error::Archived app is missing emexDE CoreCompiler support dylibs" >&2
            forbidden=1
          fi

          if find "$APP_PATH" -path '*/BuildKitAssets/SDK/*' -print -quit | grep -q .; then
            echo "::error::Launch-safe IPA must not embed expanded BuildKit SDK payload" >&2
            forbidden=1
          fi

          if [ "$forbidden" -ne 0 ]; then
            exit 1
          fi
          echo "Launch-safe IPA includes emexDE CoreCompiler runtime but keeps private BuildKit SDK assets external."

      - name: Package KittyStore/AltStore IPA artifact
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Litter.xcarchive/Products/Applications -type d -name '*.app' -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive" >&2
            find build/Litter.xcarchive -print
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload build/unsigned-ipa
          cp -R "$APP_PATH" Payload/
          APP_BUNDLE="Payload/$(basename "$APP_PATH")"

          # KittyStore/AltStore re-sign the IPA after download. Keep only the
          # LiveProcess NSExtension required by original Nyxian/emexDE.
          find "$APP_BUNDLE" -name _CodeSignature -type d -prune -exec rm -rf {} +
          find "$APP_BUNDLE" -name embedded.mobileprovision -type f -delete
          find "$APP_BUNDLE" -name CodeResources -type f -delete
          find "$APP_BUNDLE" -name '*.xcent' -type f -delete

          if [ "${LITTER_PRESERVE_NYXIAN_LIVEPROCESS:-0}" = "1" ]; then
            mkdir -p "$APP_BUNDLE/PlugIns"
            LIVEPROCESS_SRC="build/nyxian-liveprocess/LiveProcess.appex"
            if [ -d "$LIVEPROCESS_SRC" ]; then
              rm -rf "$APP_BUNDLE/PlugIns/LiveProcess.appex"
              cp -R "$LIVEPROCESS_SRC" "$APP_BUNDLE/PlugIns/LiveProcess.appex"
            elif [ ! -d "$APP_BUNDLE/PlugIns/LiveProcess.appex" ]; then
              echo "::error::IPA is missing LiveProcess.appex for the Nyxian/emexDE runtime" >&2
              exit 1
            fi
            find "$APP_BUNDLE/PlugIns" -mindepth 1 -maxdepth 1 -type d ! -name 'LiveProcess.appex' -prune -exec rm -rf {} +
            rm -rf "$APP_BUNDLE/Watch" "$APP_BUNDLE/AppClips"
            find "$APP_BUNDLE" -name _CodeSignature -type d -prune -exec rm -rf {} +
            find "$APP_BUNDLE" -name embedded.mobileprovision -type f -delete
            find "$APP_BUNDLE" -name CodeResources -type f -delete
            find "$APP_BUNDLE" -name '*.xcent' -type f -delete
            /usr/libexec/PlistBuddy -c 'Print :NSExtension' "$APP_BUNDLE/PlugIns/LiveProcess.appex/Info.plist" >/dev/null
            if find "$APP_BUNDLE" \( -name _CodeSignature -o -name embedded.mobileprovision \) -print -quit | grep -q .; then
              echo "::error::Unsigned sideload IPA still contains stale signatures or mobileprovisions." >&2
              find "$APP_BUNDLE" \( -name _CodeSignature -o -name embedded.mobileprovision \) -print >&2
              exit 1
            fi
            echo "IPA keeps PlugIns/LiveProcess.appex for the Nyxian/emexDE runtime."
          else
            rm -rf "$APP_BUNDLE/PlugIns" "$APP_BUNDLE/Watch" "$APP_BUNDLE/AppClips"
            if find "$APP_BUNDLE" \( -name _CodeSignature -o -name embedded.mobileprovision -o -name '*.appex' \) -print -quit | grep -q .; then
              echo "::error::Unsigned sideload IPA still contains stale signatures or embedded extensions." >&2
              find "$APP_BUNDLE" \( -name _CodeSignature -o -name embedded.mobileprovision -o -name '*.appex' \) -print >&2
              exit 1
            fi
          fi

          INFO_PLIST="$APP_BUNDLE/Info.plist"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$INFO_PLIST" 2>/dev/null || true)"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST" 2>/dev/null || true)"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST" 2>/dev/null || true)"

          python3 - "$VERSION" "$BUILD" <<'PY'
          import re
          import sys
          version, build = sys.argv[1], sys.argv[2]
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:\.\d+)?", version):
              raise SystemExit(f"::error::MARKETING_VERSION must be numeric SemVer, got {version!r}")
          if not re.fullmatch(r"\d+", build):
              raise SystemExit(f"::error::CURRENT_PROJECT_VERSION must be a numeric build, got {build!r}")
          PY

          IPA_NAME="Litter-${VERSION}.ipa"
          /usr/bin/zip -qry "build/unsigned-ipa/$IPA_NAME" Payload
          IPA_PATH="build/unsigned-ipa/$IPA_NAME"
          IPA_SHA256="$(shasum -a 256 "$IPA_PATH" | awk '{print $1}')"
          IPA_SIZE="$(stat -f%z "$IPA_PATH")"
          printf '%s  %s\n' "$IPA_SHA256" "$IPA_NAME" > "${IPA_PATH}.sha256"

          export BUNDLE_ID VERSION BUILD IPA_NAME IPA_SHA256 IPA_SIZE
          export BUILD_MODE="$LITTER_IOS_BUILD_MODE"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          metadata = {
              "name": "Litter",
              "bundleIdentifier": os.environ["BUNDLE_ID"],
              "version": os.environ["VERSION"],
              "build": os.environ["BUILD"],
              "publicVersion": os.environ["VERSION"],
              "commit": os.environ["GITHUB_SHA"],
              "buildMode": os.environ["BUILD_MODE"],
              "minimumIOSVersion": "18.0",
              "sdkFamily": "iOS26",
              "xcode": "26.3",
              "artifact": os.environ["IPA_NAME"],
              "sha256": os.environ["IPA_SHA256"],
              "size": int(os.environ["IPA_SIZE"]),
              "distribution": "unsigned IPA for KittyStore/AltStore re-signing; not directly installable on stock iOS without signing",
              "nyxianLiveProcessExtension": os.environ.get("LITTER_NYXIAN_PRIVATE_BUILD") == "1",
              "privateBuildKitAssetsEmbedded": os.environ.get("LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS") == "1",
          }
          Path("build/unsigned-ipa/build-metadata.json").write_text(json.dumps(metadata, indent=2) + "\n")
          PY

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Litter-unsigned-ipa
          path: build/unsigned-ipa
          if-no-files-found: error

      - name: Publish unsigned IPA release asset
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          BUILD_MODE: ${{ env.LITTER_IOS_BUILD_MODE }}
        run: |
          set -euo pipefail
          METADATA_PATH="build/unsigned-ipa/build-metadata.json"
          NOTES_PATH="build/unsigned-ipa/release-notes.md"
          UPDATE_PATH="build/unsigned-ipa/litter-update.json"
          SOURCE_PATH="build/unsigned-ipa/litter-altstore-source.json"

          VERSION="$(python3 -c 'import json; print(json.load(open("build/unsigned-ipa/build-metadata.json"))["version"])')"
          BUILD="$(python3 -c 'import json; print(json.load(open("build/unsigned-ipa/build-metadata.json"))["build"])')"
          IPA_NAME="$(python3 -c 'import json; print(json.load(open("build/unsigned-ipa/build-metadata.json"))["artifact"])')"
          IPA_SHA256="$(python3 -c 'import json; print(json.load(open("build/unsigned-ipa/build-metadata.json"))["sha256"])')"
          IPA_SIZE="$(python3 -c 'import json; print(json.load(open("build/unsigned-ipa/build-metadata.json"))["size"])')"
          BUNDLE_ID="$(python3 -c 'import json; print(json.load(open("build/unsigned-ipa/build-metadata.json"))["bundleIdentifier"])')"
          IPA_PATH="build/unsigned-ipa/$IPA_NAME"
          SHA_PATH="${IPA_PATH}.sha256"
          RELEASE_TAG="litter-v${VERSION}"
          RELEASE_TITLE="Litter ${VERSION}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          IPA_DOWNLOAD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${IPA_NAME}"
          SOURCE_TAG="app-source"
          SOURCE_BASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${SOURCE_TAG}"
          SOURCE_URL="${SOURCE_BASE_URL}/litter-altstore-source.json"
          APP_ICON_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/apps/ios/Sources/Litter/Assets.xcassets/AppIcon.appiconset/Icon-1024.png"
          SOURCE_ICON_PATH="tools/assets/kittystore-source-icon.heic"
          SOURCE_ICON_DEST="build/unsigned-ipa/kittystore-source-icon.heic"
          SOURCE_ICON_URL="${SOURCE_BASE_URL}/kittystore-source-icon.heic"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [ ! -s "$IPA_PATH" ]; then
            echo "::error::Missing unsigned IPA at $IPA_PATH" >&2
            exit 1
          fi
          if [ ! -s "$SOURCE_ICON_PATH" ]; then
            echo "::error::Missing stable source icon at $SOURCE_ICON_PATH" >&2
            exit 1
          fi
          cp "$SOURCE_ICON_PATH" "$SOURCE_ICON_DEST"

          export VERSION BUILD IPA_NAME IPA_SHA256 IPA_SIZE BUNDLE_ID RELEASE_URL IPA_DOWNLOAD_URL SOURCE_URL APP_ICON_URL SOURCE_ICON_URL PUBLISHED_AT BUILD_MODE
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.request
          from pathlib import Path

          token = os.environ.get("GH_TOKEN", "")
          repository = os.environ["GITHUB_REPOSITORY"]
          api_root = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
          current_release_tag = f"litter-v{os.environ['VERSION']}"
          SCREENSHOT_FILES = [
              ("01-hero-iphone-1320x2868.png", 1320, 2868),
              ("02-remote-iphone-1320x2868.png", 1320, 2868),
              ("07-generative-ui-iphone-1320x2868.png", 1320, 2868),
              ("05-realtime-voice-iphone-1320x2868.png", 1320, 2868),
          ]
          MAX_SOURCE_NEWS_ITEMS = 3

          def screenshot_url(filename):
              return f"https://raw.githubusercontent.com/{repository}/{os.environ['GITHUB_SHA']}/docs/screenshots/{filename}"

          screenshot_urls = [screenshot_url(filename) for filename, _, _ in SCREENSHOT_FILES]
          screenshots = {
              "iphone": [
                  {"imageURL": screenshot_url(filename), "width": width, "height": height}
                  for filename, width, height in SCREENSHOT_FILES
              ]
          }

          def request_json(url, accept="application/vnd.github+json"):
              headers = {
                  "Accept": accept,
                  "User-Agent": "litter-altstore-source-builder",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=45) as response:
                  return json.loads(response.read().decode("utf-8"))

          def request_asset_text(asset):
              headers = {
                  "Accept": "application/octet-stream",
                  "User-Agent": "litter-altstore-source-builder",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(asset["url"], headers=headers)
              with urllib.request.urlopen(req, timeout=45) as response:
                  return response.read().decode("utf-8", errors="replace")

          def request_asset_json(asset):
              try:
                  return request_json(asset["url"], accept="application/octet-stream")
              except Exception as error:
                  print(f"Could not read {asset.get('name', 'asset')}: {error}")
                  return {}

          def release_pages():
              page = 1
              while page <= 10:
                  url = f"{api_root}/repos/{repository}/releases?per_page=100&page={page}"
                  releases = request_json(url)
                  if not releases:
                      break
                  yield from releases
                  if len(releases) < 100:
                      break
                  page += 1

          def git_lines(args):
              try:
                  result = subprocess.run(["git", *args], check=True, capture_output=True, text=True)
                  return [line for line in result.stdout.splitlines() if line.strip()]
              except Exception:
                  return []

          def tag_exists(tag):
              return bool(tag and git_lines(["rev-parse", "--verify", "--quiet", f"refs/tags/{tag}"]))

          def iso_date(value):
              return value or "1970-01-01T00:00:00Z"

          def semver_key(version):
              parts = [int(part) for part in re.findall(r"\d+", version)]
              return tuple((parts + [0, 0, 0, 0])[:4])

          def build_key(build):
              return int(build) if str(build).isdigit() else -1

          def slug(value):
              cleaned = re.sub(r"[^A-Za-z0-9]+", "-", str(value)).strip("-").lower()
              return cleaned or "item"

          def asset_named(release, name):
              for asset in release.get("assets", []):
                  if asset.get("name") == name:
                      return asset
              return None

          def is_litter_ipa(asset):
              name = asset.get("name", "").lower()
              return name.endswith(".ipa") and "litter" in name

          def ipa_asset_for(release, metadata):
              wanted = str(metadata.get("ipaAssetName") or metadata.get("artifact") or "")
              if wanted:
                  asset = asset_named(release, wanted)
                  if asset and is_litter_ipa(asset):
                      return asset
              return next((asset for asset in release.get("assets", []) if is_litter_ipa(asset)), None)

          def parsed_from_tag_or_asset(release, ipa_asset):
              tag = release.get("tag_name", "")
              name = ipa_asset.get("name", "") if ipa_asset else ""
              version = ""
              build = ""
              for pattern in (
                  r"^litter-v(\d+\.\d+\.\d+(?:\.\d+)?)$",
                  r"^ios-v(\d+\.\d+\.\d+(?:\.\d+)?)-build\.(\d+)$",
                  r"^Litter-v?(\d+\.\d+\.\d+(?:\.\d+)?)(?:-build\.(\d+))?.*\.ipa$",
              ):
                  match = re.match(pattern, tag) or re.match(pattern, name)
                  if match:
                      version = match.group(1)
                      if len(match.groups()) > 1 and match.group(2):
                          build = match.group(2)
                      break
              legacy = re.match(r"^litter-v(\d+)$", tag)
              if legacy and not build:
                  build = legacy.group(1)
              return version, build

          def release_metadata(release):
              metadata = {}
              for metadata_name in ("build-metadata.json", "litter-update.json"):
                  metadata_asset = asset_named(release, metadata_name)
                  if metadata_asset:
                      loaded = request_asset_json(metadata_asset)
                      if loaded:
                          metadata.update(loaded)
              return metadata

          def normalized_sha256(value):
              text = str(value or "").strip()
              if re.fullmatch(r"[A-Fa-f0-9]{64}", text):
                  return text.lower()
              return ""

          def sha256_from_text(value):
              match = re.search(r"\b([A-Fa-f0-9]{64})\b", value or "")
              return match.group(1).lower() if match else ""

          def sha256_for_release(release, metadata, ipa_asset):
              metadata_sha = normalized_sha256(metadata.get("sha256"))
              if metadata_sha:
                  return metadata_sha

              ipa_name = str(ipa_asset.get("name") or "")
              sha_assets = []
              for asset in release.get("assets", []):
                  name = str(asset.get("name") or "")
                  lower = name.lower()
                  if not lower.endswith(".sha256"):
                      continue
                  if ipa_name and (name == f"{ipa_name}.sha256" or ipa_name in name):
                      sha_assets.insert(0, asset)
                  else:
                      sha_assets.append(asset)

              for asset in sha_assets:
                  try:
                      parsed = sha256_from_text(request_asset_text(asset))
                  except Exception as error:
                      print(f"Could not read checksum asset {asset.get('name', 'asset')}: {error}")
                      continue
                  if parsed:
                      return parsed

              release_name = release.get("tag_name") or release.get("name") or "release"
              print(f"Skipping {release_name} in AltStore source versions because its IPA has no usable sha256 metadata")
              return ""

          def clean_history_lines(tag, previous_tag, current=False):
              target = "HEAD" if current else tag
              if current or tag_exists(tag):
                  git_range = f"{previous_tag}..{target}" if previous_tag and tag_exists(previous_tag) else target
                  lines = git_lines(["log", "--no-merges", "--max-count=40", "--pretty=format:- %s (%h)", git_range])
                  if lines:
                      return lines
              return []

          def fallback_body(release, metadata):
              body = str(metadata.get("releaseNotes") or release.get("body") or "").strip()
              if body.startswith("Unsigned Litter IPA for KittyStore/AltStore re-signing.") and "Update history:" not in body:
                  return ""
              return body

          def notes_for(entry, release, metadata, previous_tag, current=False):
              history = clean_history_lines(release.get("tag_name", ""), previous_tag, current=current)
              fallback = fallback_body(release, metadata)
              lines = ["Unsigned Litter IPA for KittyStore/AltStore re-signing.", "", "Update history:"]
              if history:
                  lines.extend(history)
              elif fallback:
                  lines.append(fallback)
              else:
                  lines.append(f"- Build refresh for Litter {entry['version']} ({entry['buildVersion']}).")
              lines.extend([
                  "",
                  "Build details:",
                  f"- App version: {entry['version']}",
                  f"- Build: {entry['buildVersion']}",
              ])
              commit = metadata.get("commit") or os.environ.get("GITHUB_SHA", "")
              if commit:
                  lines.append(f"- Commit: {commit}")
              branch = os.environ.get("GITHUB_REF_NAME", "")
              if current and branch:
                  lines.append(f"- Branch: {branch}")
              build_mode = metadata.get("buildMode") or os.environ.get("BUILD_MODE", "")
              if build_mode:
                  lines.append(f"- Build mode: {build_mode}")
              if metadata.get("nyxianLiveProcessExtension"):
                  lines.append("- Nyxian LiveProcess extension: embedded")
              if metadata.get("privateBuildKitAssetsEmbedded"):
                  lines.append("- Private BuildKit assets: embedded")
              sha256 = metadata.get("sha256") or os.environ.get("IPA_SHA256", "")
              if sha256:
                  lines.append(f"- SHA-256: {sha256}")
              workflow = f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{repository}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
              if current and os.environ.get("GITHUB_RUN_ID"):
                  lines.append(f"- Workflow run: {workflow}")
              lines.extend(["", "This IPA is unsigned and must be signed by KittyStore, AltStore, Feather, or another signing tool before installation."])
              return "\n".join(lines) + "\n"

          current_metadata = {
              "name": "Litter",
              "bundleIdentifier": os.environ["BUNDLE_ID"],
              "version": os.environ["VERSION"],
              "build": os.environ["BUILD"],
              "publicVersion": os.environ["VERSION"],
              "commit": os.environ["GITHUB_SHA"],
              "buildMode": os.environ["BUILD_MODE"],
              "minimumIOSVersion": "18.0",
              "artifact": os.environ["IPA_NAME"],
              "ipaAssetName": os.environ["IPA_NAME"],
              "ipaDownloadURL": os.environ["IPA_DOWNLOAD_URL"],
              "sha256": os.environ["IPA_SHA256"],
              "size": int(os.environ["IPA_SIZE"]),
              "publishedAt": os.environ["PUBLISHED_AT"],
              "releaseURL": os.environ["RELEASE_URL"],
              "iconURL": os.environ["APP_ICON_URL"],
              "distribution": "unsigned IPA for KittyStore/AltStore re-signing; not directly installable on stock iOS without signing",
              "nyxianLiveProcessExtension": os.environ.get("LITTER_NYXIAN_PRIVATE_BUILD") == "1",
              "privateBuildKitAssetsEmbedded": os.environ.get("LITTER_EMBED_PRIVATE_BUILDKIT_ASSETS") == "1",
          }
          current_release = {
              "tag_name": current_release_tag,
              "published_at": os.environ["PUBLISHED_AT"],
              "created_at": os.environ["PUBLISHED_AT"],
              "body": "",
              "assets": [
                  {
                      "name": os.environ["IPA_NAME"],
                      "browser_download_url": os.environ["IPA_DOWNLOAD_URL"],
                      "size": int(os.environ["IPA_SIZE"]),
                  }
              ],
          }

          releases = [release for release in release_pages() if not release.get("draft")]
          source_releases = []
          for release in releases:
              if release.get("tag_name") == current_release_tag:
                  continue
              metadata = release_metadata(release)
              ipa_asset = ipa_asset_for(release, metadata)
              if not ipa_asset:
                  continue
              bundle_id = str(metadata.get("bundleIdentifier") or os.environ["BUNDLE_ID"])
              if bundle_id != os.environ["BUNDLE_ID"]:
                  continue
              source_releases.append((release, metadata, ipa_asset))
          source_releases.append((current_release, current_metadata, current_release["assets"][0]))

          ordered_for_history = sorted(source_releases, key=lambda item: iso_date(item[0].get("published_at") or item[0].get("created_at")))
          previous_tags = {}
          previous = ""
          for release, _, _ in ordered_for_history:
              tag = release.get("tag_name", "")
              if tag:
                  previous_tags[tag] = previous
                  previous = tag

          current_entry = {
              "version": os.environ["VERSION"],
              "buildVersion": os.environ["BUILD"],
              "date": os.environ["PUBLISHED_AT"],
              "localizedDescription": "",
              "downloadURL": os.environ["IPA_DOWNLOAD_URL"],
              "size": int(os.environ["IPA_SIZE"]),
              "minOSVersion": "18.0",
              "sha256": os.environ["IPA_SHA256"].lower(),
          }
          notes = notes_for(current_entry, current_release, current_metadata, previous_tags.get(current_release_tag, ""), current=True)
          current_entry["localizedDescription"] = notes
          current_metadata["releaseNotes"] = notes
          current_metadata["altStoreSourceURL"] = os.environ["SOURCE_URL"]
          current_metadata["sideStoreSourceURL"] = os.environ["SOURCE_URL"]
          Path("build/unsigned-ipa/release-notes.md").write_text(notes)
          Path("build/unsigned-ipa/build-metadata.json").write_text(json.dumps(current_metadata, indent=2) + "\n")

          update = {
              "schemaVersion": 1,
              "name": "Litter",
              "bundleIdentifier": os.environ["BUNDLE_ID"],
              "version": os.environ["VERSION"],
              "build": os.environ["BUILD"],
              "publicVersion": os.environ["VERSION"],
              "commit": os.environ["GITHUB_SHA"],
              "buildMode": os.environ["BUILD_MODE"],
              "minimumIOSVersion": "18.0",
              "ipaAssetName": os.environ["IPA_NAME"],
              "ipaDownloadURL": os.environ["IPA_DOWNLOAD_URL"],
              "sha256": os.environ["IPA_SHA256"],
              "size": int(os.environ["IPA_SIZE"]),
              "publishedAt": os.environ["PUBLISHED_AT"],
              "releaseNotes": notes,
              "releaseURL": os.environ["RELEASE_URL"],
              "iconURL": os.environ["APP_ICON_URL"],
              "sideStoreSourceURL": os.environ["SOURCE_URL"],
              "altStoreSourceURL": os.environ["SOURCE_URL"],
          }

          versions_by_url = {current_entry["downloadURL"]: current_entry}
          for release, metadata, ipa_asset in source_releases:
              parsed_version, parsed_build = parsed_from_tag_or_asset(release, ipa_asset)
              version = str(metadata.get("version") or parsed_version or os.environ["VERSION"])
              build = str(metadata.get("build") or metadata.get("buildVersion") or parsed_build or "0")
              download_url = str(metadata.get("ipaDownloadURL") or ipa_asset.get("browser_download_url") or "")
              if not download_url or download_url in versions_by_url:
                  continue
              sha256 = sha256_for_release(release, metadata, ipa_asset)
              if not sha256:
                  continue
              entry = {
                  "version": version,
                  "buildVersion": build,
                  "date": str(metadata.get("publishedAt") or release.get("published_at") or release.get("created_at") or os.environ["PUBLISHED_AT"]),
                  "localizedDescription": "",
                  "downloadURL": download_url,
                  "size": int(metadata.get("size") or ipa_asset.get("size") or 0),
                  "minOSVersion": str(metadata.get("minimumIOSVersion") or "18.0"),
                  "sha256": sha256,
              }
              entry["localizedDescription"] = notes_for(entry, release, metadata, previous_tags.get(release.get("tag_name", ""), ""), current=False)
              versions_by_url[download_url] = entry

          versions = list(versions_by_url.values())
          versions.sort(key=lambda item: (semver_key(item["version"]), build_key(item.get("buildVersion", "0")), item.get("date", "")), reverse=True)

          archive_news = []
          for entry in versions[:MAX_SOURCE_NEWS_ITEMS]:
              download_url = entry.get("downloadURL", "")
              if not download_url:
                  continue
              version = str(entry.get("version") or "unknown")
              build = str(entry.get("buildVersion") or "0")
              archive_news.append({
                  "title": f"Litter {version} IPA",
                  "identifier": f"litter-ipa-{slug(version)}-{slug(build)}",
                  "caption": f"Direct IPA download for Litter {version} build {build}.",
                  "date": str(entry.get("date") or os.environ["PUBLISHED_AT"]),
                  "tintColor": "06B6D4",
                  "url": download_url,
                  "appID": os.environ["BUNDLE_ID"],
                  "notify": False,
              })

          source = {
              "name": "KittyStore",
              "identifier": "com.nightvibes33.zyn.source",
              "sourceURL": os.environ["SOURCE_URL"],
              "subtitle": "Litter unsigned IPA source",
              "description": "The Litter app entry installs the latest compatible build. Full install history stays in the app versions list; source news only highlights the latest IPA builds.",
              "iconURL": os.environ["SOURCE_ICON_URL"],
              "developerName": "NightVibes33",
              "apps": [
                  {
                      "name": "Litter",
                      "bundleIdentifier": os.environ["BUNDLE_ID"],
                      "developerName": "NightVibes33",
                      "iconURL": os.environ["APP_ICON_URL"],
                      "screenshotURLs": screenshot_urls,
                      "screenshots": screenshots,
                      "subtitle": "Mobile Codex workspace for iPhone",
                      "localizedDescription": "Litter for sideloaded iOS installs.",
                      "category": "developer",
                      "tintColor": "06B6D4",
                      "versions": versions,
                      "appPermissions": {
                          "entitlements": [
                              "aps-environment",
                              "com.apple.developer.carplay-voice-based-conversation",
                              "com.apple.security.application-groups"
                          ],
                          "privacy": {}
                      }
                  }
              ],
              "news": archive_news
          }
          Path("build/unsigned-ipa/litter-update.json").write_text(json.dumps(update, indent=2) + "\n")
          Path("build/unsigned-ipa/litter-altstore-source.json").write_text(json.dumps(source, indent=2) + "\n")
          print(f"AltStore source versions: {len(versions)}")
          print(f"AltStore source latest-news cards: {len(archive_news)}")
          PY

          python3 tools/scripts/verify-altstore-source.py "$SOURCE_PATH" --require-screenshots --max-news-items 3

          retry_release_command() {
            label="$1"
            shift
            attempt=1
            delay=10
            while [ "$attempt" -le 5 ]; do
              echo "==> $label (attempt $attempt/5)"
              if "$@"; then
                return 0
              fi
              status=$?
              if [ "$attempt" -eq 5 ]; then
                echo "::error::$label failed after 5 attempts with exit code $status" >&2
                return "$status"
              fi
              echo "$label failed with exit code $status; retrying after ${delay}s" >&2
              sleep "$delay"
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
          }

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            retry_release_command "Upload ${RELEASE_TAG} release assets" \
              gh release upload "$RELEASE_TAG" \
                "$IPA_PATH" \
                "$SHA_PATH" \
                "$METADATA_PATH" \
                "$UPDATE_PATH" \
                "$SOURCE_PATH" \
                "$NOTES_PATH" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber
            retry_release_command "Update ${RELEASE_TAG} release notes" \
              gh release edit "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$RELEASE_TITLE" \
                --notes-file "$NOTES_PATH"
          else
            retry_release_command "Create ${RELEASE_TAG} release" \
              gh release create "$RELEASE_TAG" \
                "$IPA_PATH" \
                "$SHA_PATH" \
                "$METADATA_PATH" \
                "$UPDATE_PATH" \
                "$SOURCE_PATH" \
                "$NOTES_PATH" \
                --repo "$GITHUB_REPOSITORY" \
                --target "$GITHUB_SHA" \
                --title "$RELEASE_TITLE" \
                --notes-file "$NOTES_PATH"
          fi

          if gh release view "$SOURCE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            retry_release_command "Upload stable source release assets" \
              gh release upload "$SOURCE_TAG" "$UPDATE_PATH" "$SOURCE_PATH" "$SOURCE_ICON_DEST" --repo "$GITHUB_REPOSITORY" --clobber
            retry_release_command "Update stable source release notes" \
              gh release edit "$SOURCE_TAG" --repo "$GITHUB_REPOSITORY" --title "Litter app source" --notes "Stable KittyStore/AltStore source metadata for all published Litter sideload builds." --prerelease
          else
            retry_release_command "Create stable source release" \
              gh release create "$SOURCE_TAG" \
                "$UPDATE_PATH" \
                "$SOURCE_PATH" \
                "$SOURCE_ICON_DEST" \
                --repo "$GITHUB_REPOSITORY" \
                --target "$GITHUB_SHA" \
                --title "Litter app source" \
                --notes "Stable KittyStore/AltStore source metadata for all published Litter sideload builds." \
                --prerelease
          fi

          echo "Release download page: ${RELEASE_URL}"
          echo "Stable app source: ${SOURCE_URL}"
