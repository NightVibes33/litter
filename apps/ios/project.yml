name: Litter
options:
  bundleIdPrefix: com.litter
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true

# DeveloperID is a release-style configuration used by the Mac Catalyst
# direct-distribution lane (notarized .dmg). It points the LitterMac target
# at a separate, unsandboxed entitlements file so the app can spawn a local
# `codex app-server`. The Mac App Store lane stays on Release with sandbox.
configs:
  Debug: debug
  Release: release
  DeveloperID: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "1"
    LITTER_RELEASE_OWNER: NightVibes33
    LITTER_RELEASE_REPO: litter
    LITTER_RELEASE_MANIFEST_ASSET_NAME: litter-update.json
    LITTER_RELEASE_SOURCE_ASSET_NAME: litter-altstore-source.json
    LITTER_RELEASE_STABLE_TAG: app-source
    LITTER_RELEASE_TAG_PREFIX: litter-v
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty"
    HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    SWIFT_INCLUDE_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    OTHER_SWIFT_FLAGS: "$(inherited)"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-device"
    "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-sim"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: UH66Q8ZAYG
    # GitHub's iOS 26 runner can fail while generating Swift explicit
    # system PCMs for Foundation, so the unsigned IPA lane stays on the
    # normal module path and relies on the workflow caches above.
    SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
    CLANG_ENABLE_EXPLICIT_MODULES: "NO"

packages:
  Hairball:
    url: https://github.com/dnakov/hairball.git
    branch: main
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: "147.0.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: "0.9.20"
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.8.0"
  SemanticVersion:
    url: https://github.com/SwiftPackageIndex/SemanticVersion.git
    exactVersion: "0.4.0"
  Starscream:
    url: https://github.com/daltoniam/Starscream.git
    from: "4.0.8"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    branch: master
  MarkdownKit:
    url: https://github.com/bmoliveira/MarkdownKit.git
    from: "1.7.1"
  AltSign:
    path: ../../ThirdParty/SideStore/AltSign
  EmexDERunestone:
    url: https://github.com/emexlab/Runestone
    exactVersion: "0.0.2"
  EmexDESwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: "1.13.0"
  EmexDETreeSitterObjc:
    url: https://github.com/tree-sitter-grammars/tree-sitter-objc.git
    branch: master
  EmexDETreeSitterC:
    url: https://github.com/tree-sitter/tree-sitter-c.git
    exactVersion: "0.20.2"
  EmexDETreeSitterCPP:
    url: https://github.com/tree-sitter/tree-sitter-cpp.git
    exactVersion: "0.23.4"
  EmexDETreeSitterXML:
    url: https://github.com/tree-sitter-grammars/tree-sitter-xml.git
    branch: master
  EmexDETreeSitterSwift:
    url: https://github.com/emexlab/tree-sitter-swift
    branch: main
  EmexDEUIOnboarding:
    url: https://github.com/lascic/UIOnboarding.git
    exactVersion: "2.0.5"
targets:
  Roxas:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.Roxas
        INFOPLIST_FILE: ../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas/Info.plist
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas"
        GCC_PREFIX_HEADER: ../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas/Roxas-Prefix.pch
        GCC_PRECOMPILE_PREFIX_HEADER: "YES"
    sources:
      - path: ../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas
        excludes:
          - Info.plist

  AltStoreCore:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.AltStoreCore
        INFOPLIST_FILE: ../../ThirdParty/SideStore/Source/AltStoreCore/Info.plist
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStoreCore $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStoreCore/Types $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared/Connections $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared/Errors $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared/Categories"
    sources:
      - path: ../../ThirdParty/SideStore/Source/AltStoreCore
        excludes:
          - Info.plist
          - Intents/**
      - path: ../../ThirdParty/SideStore/Source/Shared
    dependencies:
      - target: Roxas
      - package: SemanticVersion
        product: SemanticVersion
      - package: KeychainAccess
        product: KeychainAccess
      - package: AltSign
        product: AltSign-Dynamic

  RustBridge:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.RustBridge
        GENERATE_INFOPLIST_FILE: "YES"
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        OTHER_LDFLAGS: "$(inherited) -lrust_bridge -lminimuxer-ios -liconv -lsqlite3 -framework Security -framework CoreFoundation -framework SystemConfiguration -framework CFNetwork"
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework/ios-arm64"
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework/ios-arm64-simulator"
    sources:
      - path: ../../ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge
        excludes:
          - Cargo.toml
          - Cargo.lock
          - Makefile
          - src/**
          - target/**
          - lib/**

  Minimuxer:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.Minimuxer
        GENERATE_INFOPLIST_FILE: "YES"
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        OTHER_LDFLAGS: "$(inherited) -lminimuxer-ios -liconv -lsqlite3 -framework Security -framework CoreFoundation -framework SystemConfiguration -framework CFNetwork"
    sources:
      - path: ../../ThirdParty/SideStore/Source/Dependencies/minimuxer/Sources
    dependencies:
      - target: RustBridge
      - package: ZIPFoundation
        product: ZIPFoundation

  SideStore:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.KittyStore
        PRODUCT_MODULE_NAME: SideStore
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStore $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStoreCore $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared"
    sources:
      - path: Sources/KittyStoreEmbedded
      - path: ../../ThirdParty/SideStore/Source/AltStore
        excludes:
          - AppDelegate.swift
          - SceneDelegate.swift
          - Info.plist
          - AltStore-Bridging-Header.h
          - Intents/**
          - Extensions/INInteraction+AltStore.swift
          - Base.lproj/**
          - Authentication/*.storyboard
          - Components/*.xib
          - My Apps/*.xib
          - News/*.xib
          - Resources/**
          - Settings/*.storyboard
          - Settings/*.xib
          - Sources/*.storyboard
          - Sources/Components/*.xib
      - path: ../../ThirdParty/SideStore/Source/SideStore
        excludes:
          - Tests/**
          - Utils/misc/**
          - EMProxyWrapper.swift
      - path: ../../ThirdParty/SideStore/Source/AltStore/Base.lproj/Main.storyboard
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Authentication/Authentication.storyboard
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Components/AppBannerView.xib
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/My Apps/InstalledAppsCollectionHeaderView.xib
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/My Apps/UpdateCollectionViewCell.xib
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/News/NewsCollectionViewCell.xib
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Resources/Assets.xcassets
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Resources/Icons.xcassets
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Resources/AltIcons.plist
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Resources/ReleaseEntitlements.plist
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Resources/Silence.m4a
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Settings/AboutPatreonHeaderView.xib
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Settings/Settings.storyboard
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Settings/SettingsHeaderFooterView.xib
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Sources/Sources.storyboard
        buildPhase: resources
      - path: ../../ThirdParty/SideStore/Source/AltStore/Sources/Components/SourceHeaderView.xib
        buildPhase: resources
    dependencies:
      - target: AltStoreCore
      - target: Roxas
      - sdk: AVFoundation.framework
      - sdk: CoreHaptics.framework
      - sdk: Intents.framework
      - sdk: IntentsUI.framework
      - sdk: MessageUI.framework
      - sdk: QuickLook.framework
      - sdk: SafariServices.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: WidgetKit.framework
      - package: AltSign
        product: AltSign-Dynamic
      - package: SemanticVersion
        product: SemanticVersion
      - package: Starscream
        product: Starscream
      - package: KeychainAccess
        product: KeychainAccess
      - package: MarkdownKit
        product: MarkdownKit
      - package: Nuke
        product: Nuke
      - target: Minimuxer

  CoreCompiler:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.emexde.CoreCompiler
        PRODUCT_MODULE_NAME: CoreCompiler
        GENERATE_INFOPLIST_FILE: "YES"
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        SWIFT_VERSION: "6.0"
        SWIFT_INSTALL_OBJC_HEADER: "NO"
        APPLICATION_EXTENSION_API_ONLY: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/EmexDE/Source/CoreCompiler $(SRCROOT)/../../ThirdParty/EmexDE/Source/CoreCompiler/Support $(SRCROOT)/../../ThirdParty/EmexDE/Source/CoreCompiler/Tools $(SRCROOT)/../../ThirdParty/EmexDE/Source/CoreCompiler/Tools/Compiler $(SRCROOT)/../../ThirdParty/EmexDE/Source/CoreCompiler/Tools/Linker $(SRCROOT)/../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/LLVM.xcframework/ios-arm64/Headers $(TOOLCHAIN_DIR)/usr/include"
