  MobileDevelopmentKit:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.emexde.MobileDevelopmentKit
        PRODUCT_MODULE_NAME: MobileDevelopmentKit
        GENERATE_INFOPLIST_FILE: "YES"
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        SWIFT_VERSION: "6.0"
        APPLICATION_EXTENSION_API_ONLY: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/EmexDE/Source/MobileDevelopmentKit $(SRCROOT)/../../ThirdParty/EmexDE/Source/MobileDevelopmentKit/PhaseEngine $(SRCROOT)/../../ThirdParty/EmexDE/Source/MobileDevelopmentKit/Support $(SRCROOT)/../../ThirdParty/EmexDE/Source/MobileDevelopmentKit/Tools $(SRCROOT)/../../ThirdParty/EmexDE/Source/MobileDevelopmentKit/Tools/Compiler $(SRCROOT)/../../ThirdParty/EmexDE/Source/MobileDevelopmentKit/Tools/Linker $(BUILT_PRODUCTS_DIR)/CoreCompiler.framework/Headers"
