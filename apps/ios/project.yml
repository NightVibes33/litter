name: Litter
options:
  bundleIdPrefix: com.litter
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true

# DeveloperID is a release-style configuration used by the Mac Catalyst
# direct-distribution lane (notarized .dmg). It points the LitterMac target
# at a separate, unsandboxed entitlements file so the app can spawn a local
# `codex app-server`. The Mac App Store lane stays on Release with sandbox.
configs:
  Debug: debug
  Release: release
  DeveloperID: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client"
    HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers $(PROJECT_DIR)/Frameworks/llama.xcframework/**/Headers"
    SWIFT_INCLUDE_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-device"
    "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-sim"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: UH66Q8ZAYG
    # Xcode 15+ explicit-module builds. First clean build is slightly
    # slower, but module graphs are cached per-target after that, so
    # incremental Swift compiles in the app target drop substantially.
    SWIFT_ENABLE_EXPLICIT_MODULES: "YES"
    CLANG_ENABLE_EXPLICIT_MODULES: "YES"

packages:
  Hairball:
    url: https://github.com/dnakov/hairball.git
    branch: main
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: "147.0.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: "0.9.20"
targets:
  Litter:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/Litter/Litter.entitlements
      properties:
        aps-environment: production
        com.apple.developer.carplay-voice-based-conversation: true
        # iCloud KVS sync (Feature C). Re-add when the iCloud container
        # `iCloud.com.sigkitten.litter` exists in the Apple Developer Portal
        # AND is enabled on the iOS app's provisioning profile. Without
        # both, archive fails: "Provisioning profile doesn't include the
        # iCloud capability."
        # com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)iCloud.com.sigkitten.litter
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
    sources:
      - path: Sources/Litter
        excludes:
          - Resources/BuildKitAssets/**
          - "**/*.h"
      - path: Resources/fs
        type: folder
        buildPhase: resources
      - path: Sources/LitterLiveActivity/CodexTurnLiveActivity.swift
      - path: Sources/LitterWatch/Models/WatchModels.swift
    resources:
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/Litter/Resources/Themes
      - path: Sources/Litter/Resources/BuildKit
      - path: Sources/Litter/Resources/TipJarProducts.storekit
      - path: Sources/Litter/Resources/home_cat.png
      - path: Sources/Litter/Resources/home_cat_entrance.png
    dependencies:
      - sdk: CarPlay.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: Accelerate.framework
      - package: Hairball
        product: HairballUI
      - package: WebRTC
        product: WebRTC
      - package: ZIPFoundation
        product: ZIPFoundation
      - framework: Frameworks/llama.xcframework
      - target: LitterLiveActivity
        embed: true
      - target: LitterWatch
        embed: true
    postBuildScripts:
      - name: Package Private BuildKit Assets
        script: |
          set -euo pipefail
          ASSET_ROOT="$SRCROOT/Sources/Litter/Resources/BuildKitAssets"
          if [ ! -d "$ASSET_ROOT" ]; then
            exit 0
          fi
          RESOURCES_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          DEST="$RESOURCES_DIR/LitterBuildKitAssets.zip"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          rm -rf "$RESOURCES_DIR/BuildKitAssets" "$DEST"
          mkdir -p "$RESOURCES_DIR"
          cp -R -L "$ASSET_ROOT" "$TMP_DIR/BuildKitAssets"
          (cd "$TMP_DIR" && ditto -c -k --norsrc --keepParent BuildKitAssets "$DEST")
      - name: Embed Private BuildKit Frameworks
        script: |
          set -euo pipefail
          if [ "${PLATFORM_NAME:-}" != "iphoneos" ]; then
            exit 0
          fi
          ASSET_ROOT="$SRCROOT/Sources/Litter/Resources/BuildKitAssets/Toolchains/Nyxian"
          if [ ! -d "$ASSET_ROOT" ]; then
            exit 0
          fi
          mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          is_buildkit_support_dylib_name() {
            case "$1" in
              lib_Compiler*.dylib|libLLVM*.dylib|libllvm*.dylib) return 0 ;;
              *) return 1 ;;
            esac
          }
          set_buildkit_dylib_id() {
            binary="$1"
            base="$(basename "$binary")"
            if is_buildkit_support_dylib_name "$base"; then
              /usr/bin/install_name_tool -id "@rpath/$base" "$binary"
            fi
          }
          rewrite_buildkit_dylib_references() {
            binary="$1"
            if [ ! -f "$binary" ]; then
              return 0
            fi
            set_buildkit_dylib_id "$binary"
            /usr/bin/otool -L "$binary" | /usr/bin/awk 'NR > 1 { print $1 }' | while IFS= read -r dependency; do
              base="$(basename "$dependency")"
              if is_buildkit_support_dylib_name "$base" && [ "$dependency" != "@rpath/$base" ]; then
                /usr/bin/install_name_tool -change "$dependency" "@rpath/$base" "$binary" 2>/dev/null || true
              fi
            done
          }
          buildkit_binary_needs_rpath() {
            binary="$1"
            /usr/bin/otool -L "$binary" | /usr/bin/grep -Eq 'CoreCompiler\.framework/CoreCompiler|lib_Compiler|libLLVM|libllvm'
          }
          has_usable_frameworks_rpath() {
            binary="$1"
            rpath="$2"
            /usr/bin/otool -l "$binary" | /usr/bin/grep -F -q "$rpath" || \
              /usr/bin/otool -l "$binary" | /usr/bin/grep -F -q '@executable_path/Frameworks'
          }
          ensure_rpath() {
            binary="$1"
            rpath="$2"
            if has_usable_frameworks_rpath "$binary" "$rpath"; then
              return 0
            fi
            /usr/bin/install_name_tool -add_rpath "$rpath" "$binary"
            if ! has_usable_frameworks_rpath "$binary" "$rpath"; then
              echo "error: failed to add a usable Frameworks rpath to $binary" >&2
              exit 1
            fi
          }
          repair_buildkit_rpath() {
            binary="$1"
            rpath="$2"
            if [ ! -f "$binary" ]; then
              return 0
            fi
            rewrite_buildkit_dylib_references "$binary"
            if buildkit_binary_needs_rpath "$binary"; then
              ensure_rpath "$binary" "$rpath"
            fi
          }
          sign_if_requested() {
            item="$1"
            if [ "${CODE_SIGNING_ALLOWED:-NO}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
              codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$item"
            fi
          }
          for framework in CoreCompiler.framework LitterBuildKitNative.framework; do
            if [ -d "$ASSET_ROOT/$framework" ]; then
              destination="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/$framework"
              executable="${framework%.framework}"
              rm -rf "$destination"
              cp -R "$ASSET_ROOT/$framework" "$destination"
              rm -rf "$destination/CoreCompilerSupportLibs"
              if [ ! -f "$destination/Info.plist" ]; then
                cat > "$destination/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>$executable</string>
            <key>CFBundleIdentifier</key>
            <string>com.sigkitten.litter.$executable</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>$executable</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>MinimumOSVersion</key>
            <string>18.0</string>
          </dict>
          </plist>
          PLIST
              fi
              repair_buildkit_rpath "$destination/$executable" "@loader_path/.."
              sign_if_requested "$destination"
            fi
          done
          copy_buildkit_support_dylibs_from() {
            root="$1"
            if [ ! -d "$root" ]; then
              return 0
            fi
            find "$root" -type f \( -name 'lib_Compiler*.dylib' -o -name 'libLLVM*.dylib' -o -name 'libllvm*.dylib' \) -print0 | while IFS= read -r -d '' library; do
              destination="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/$(basename "$library")"
              rm -f "$destination"
              cp "$library" "$destination"
              repair_buildkit_rpath "$destination" "@loader_path"
              sign_if_requested "$destination"
            done
          }
          SUPPORT_ROOT="$ASSET_ROOT/CoreCompilerSupportLibs"
          SDK_ROOT="$SRCROOT/Sources/Litter/Resources/BuildKitAssets/SDK"
          copy_buildkit_support_dylibs_from "$SUPPORT_ROOT"
          copy_buildkit_support_dylibs_from "$SDK_ROOT"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter
        INFOPLIST_FILE: Sources/Litter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIBackgroundModes: "audio fetch remote-notification"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client"
        Release:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
  LitterMac:
    type: application
    platform: auto
    supportedDestinations:
      - macCatalyst
    entitlements:
      path: Sources/Litter/Litter-Catalyst.entitlements
      properties:
        aps-environment: production
        # iCloud KVS sync (Feature C). Re-add when the iCloud container
        # `iCloud.com.sigkitten.litter` exists in the Apple Developer Portal
        # AND the Mac App Store profile is regenerated to include the iCloud
        # capability. Direct-dist (DeveloperID entitlements) keeps the key
        # because Developer ID apps validate iCloud at runtime, not via profile.
        # com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)iCloud.com.sigkitten.litter
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
        com.apple.security.app-sandbox: true
        com.apple.security.device.bluetooth: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    sources:
      - path: Sources/Litter
        excludes:
          - CarPlay/**
          - Info.plist
          - Litter.entitlements
          - Litter-Catalyst.entitlements
          - Litter-Catalyst-DeveloperID.entitlements
          - Models/AppLifecycleController.swift
          - Models/AppRuntimeController.swift
          - Models/CodexTurnAttributes.swift
          - Models/CodexVoiceCallAttributes.swift
          - Models/OrientationResponder.swift
          - Models/RealtimeWebRtcSession.swift
          - Models/StableSafeAreaInsets.swift
          - Models/TurnLiveActivityController.swift
          - Models/VoiceRuntimeController.swift
          - Models/VoiceSessionControl.swift
          - Models/VoiceSessionModels.swift
          - Models/WatchCompanionBridge.swift
          - Models/WatchProjection.swift
          - Resources/BuildKitAssets/**
          - Views/HomeVoiceOrbButton.swift
          - Views/InlineVoiceButton.swift
          - Views/InlineVoiceStatusStrip.swift
          - Views/LiveActivityPreview.swift
          - Views/LockScreenCardView.swift
          - Views/RealtimeVoiceScreen.swift
          - Views/VoiceCallView.swift
          - Bridge/LitterLlamaBridge.mm
          - "**/*.h"
    resources:
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/Litter/Resources/Themes
      - path: Sources/Litter/Resources/BuildKit
      - path: Sources/Litter/Resources/TipJarProducts.storekit
      - path: Sources/Litter/Resources/home_cat.png
      - path: Sources/Litter/Resources/home_cat_entrance.png
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - sdk: Metal.framework
      - package: Hairball
        product: HairballUI
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        PRODUCT_NAME: Litter
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        INFOPLIST_FILE: Sources/Litter/Info-Catalyst.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MACCATALYST_OPTIMIZED_FOR_MAC: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        "LIBRARY_SEARCH_PATHS[sdk=macosx*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-macabi"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client"
        Release:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
        # Direct-distribution (notarized .dmg) lane. Re-points
        # CODE_SIGN_ENTITLEMENTS at the unsandboxed entitlements file so the
        # Mac build can spawn a local `codex app-server`. Same automatic
        # signing flow as Release; the actual cert is selected via the
        # APP_CODE_SIGN_IDENTITY override the script passes through.
        DeveloperID:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: Sources/Litter/Litter-Catalyst-DeveloperID.entitlements
  LitterLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/LitterLiveActivity/LitterLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterLiveActivity
      - path: Sources/Litter/Models/CodexTurnAttributes.swift
      - path: Sources/Litter/Models/CodexVoiceCallAttributes.swift
      - path: Sources/Litter/Models/LitterPalette.swift
      - path: Sources/Litter/Models/VoiceSessionControl.swift
      - path: Sources/Litter/Views/LockScreenCardView.swift
    resources:
      - path: Sources/LitterLiveActivity/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.liveactivity
        INFOPLIST_FILE: Sources/LitterLiveActivity/Info.plist
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(LIVE_ACTIVITY_CODE_SIGN_STYLE)"
          LIVE_ACTIVITY_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER)"
          LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER: ""
          ENABLE_DEBUG_DYLIB: NO
        Release:
          CODE_SIGN_STYLE: "$(LIVE_ACTIVITY_CODE_SIGN_STYLE)"
          LIVE_ACTIVITY_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(LIVE_ACTIVITY_CODE_SIGN_IDENTITY)"
          LIVE_ACTIVITY_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER)"
          LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER: ""
  LitterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: Sources/LitterWatch/LitterWatch.entitlements
      properties:
        aps-environment: production
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterWatch
        excludes:
          - "Assets.xcassets"
      - path: Sources/Litter/AppIcon.icon
    resources:
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/LitterWatch/Assets.xcassets
    dependencies:
      - target: LitterWatchComplications
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.watchkitapp
        INFOPLIST_FILE: Sources/LitterWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        GENERATE_INFOPLIST_FILE: NO
        SDKROOT: watchos
        SUPPORTS_MACCATALYST: NO
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(WATCH_CODE_SIGN_STYLE)"
          WATCH_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: "$(WATCH_CODE_SIGN_STYLE)"
          WATCH_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(WATCH_CODE_SIGN_IDENTITY)"
          WATCH_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_PROVISIONING_PROFILE_SPECIFIER: ""

  LitterWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: Sources/LitterWatchComplications/LitterWatchComplications.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterWatchComplications
        excludes:
          - "Assets.xcassets"
    resources:
      - path: Sources/LitterWatchComplications/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.watchkitapp.complications
        INFOPLIST_FILE: Sources/LitterWatchComplications/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        SDKROOT: watchos
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(WATCH_COMP_CODE_SIGN_STYLE)"
          WATCH_COMP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: "$(WATCH_COMP_CODE_SIGN_STYLE)"
          WATCH_COMP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(WATCH_COMP_CODE_SIGN_IDENTITY)"
          WATCH_COMP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER: ""

  LitterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/LitterTests
    dependencies:
      - target: Litter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false
  LitterUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/LitterUITests
      - path: SnapshotHelper.swift
    dependencies:
      - target: Litter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Litter
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false

schemes:
  LitterWatch:
    build:
      targets:
        LitterWatch: all
        LitterWatchComplications: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 2
  Litter:
    build:
      targets:
        Litter: all
    run:
      config: Debug
      customLLDBInit: $(SRCROOT)/.lldbinit
    test:
      config: Debug
      targets:
        - LitterTests
        - LitterUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 1
  LitterMac:
    build:
      targets:
        LitterMac: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    # Default archive uses Release (sandboxed) for the App Store lane.
    # The direct-distribution script overrides via `-configuration DeveloperID`.
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 3
