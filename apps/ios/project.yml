name: Litter
options:
  bundleIdPrefix: com.litter
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true

# DeveloperID is a release-style configuration used by the Mac Catalyst
# direct-distribution lane (notarized .dmg). It points the LitterMac target
# at a separate, unsandboxed entitlements file so the app can spawn a local
# `codex app-server`. The Mac App Store lane stays on Release with sandbox.
configs:
  Debug: debug
  Release: release
  DeveloperID: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "1"
    LITTER_RELEASE_OWNER: NightVibes33
    LITTER_RELEASE_REPO: litter
    LITTER_RELEASE_MANIFEST_ASSET_NAME: litter-update.json
    LITTER_RELEASE_SOURCE_ASSET_NAME: litter-altstore-source.json
    LITTER_RELEASE_STABLE_TAG: app-source
    LITTER_RELEASE_TAG_PREFIX: litter-v
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty $(KITTYSTORE_MINIMUXER_LDFLAGS)"
    HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    SWIFT_INCLUDE_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    OTHER_SWIFT_FLAGS: "$(inherited) $(KITTYSTORE_MINIMUXER_SWIFT_FLAGS)"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-device"
    "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-sim"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: UH66Q8ZAYG
    # Xcode 15+ explicit-module builds. First clean build is slightly
    # slower, but module graphs are cached per-target after that, so
    # incremental Swift compiles in the app target drop substantially.
    SWIFT_ENABLE_EXPLICIT_MODULES: "YES"
    CLANG_ENABLE_EXPLICIT_MODULES: "YES"

packages:
  Hairball:
    url: https://github.com/dnakov/hairball.git
    branch: main
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: "147.0.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: "0.9.20"
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.8.0"
  SemanticVersion:
    url: https://github.com/SwiftPackageIndex/SemanticVersion.git
    exactVersion: "0.4.0"
  Starscream:
    url: https://github.com/daltoniam/Starscream.git
    from: "4.0.8"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    branch: master
  MarkdownKit:
    url: https://github.com/bmoliveira/MarkdownKit.git
    from: "1.7.1"
  AltSign:
    path: ../../ThirdParty/SideStore/AltSign
targets:
  Roxas:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.Roxas
        INFOPLIST_FILE: ../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas/Info.plist
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas"
        GCC_PREFIX_HEADER: ../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas/Roxas-Prefix.pch
        GCC_PRECOMPILE_PREFIX_HEADER: "YES"
    sources:
      - path: ../../ThirdParty/SideStore/Source/Dependencies/Roxas/Roxas
        excludes:
          - Info.plist

  AltStoreCore:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.AltStoreCore
        INFOPLIST_FILE: ../../ThirdParty/SideStore/Source/AltStoreCore/Info.plist
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStoreCore $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStoreCore/Types $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared/Connections $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared/Errors $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared/Categories"
    sources:
      - path: ../../ThirdParty/SideStore/Source/AltStoreCore
        excludes:
          - Info.plist
          - Intents/**
      - path: ../../ThirdParty/SideStore/Source/Shared
    dependencies:
      - target: Roxas
      - package: SemanticVersion
        product: SemanticVersion
      - package: KeychainAccess
        product: KeychainAccess
      - package: AltSign
        product: AltSign-Dynamic

  RustBridge:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.RustBridge
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        OTHER_LDFLAGS: "$(inherited) -lrust_bridge -liconv -lsqlite3 -framework Security -framework CoreFoundation -framework SystemConfiguration -framework CFNetwork"
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework/ios-arm64"
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge/lib/RustBridge.xcframework/ios-arm64-simulator"
    sources:
      - path: ../../ThirdParty/SideStore/Source/Dependencies/minimuxer/RustBridge
        excludes:
          - Cargo.toml
          - Cargo.lock
          - Makefile
          - src/**
          - target/**
          - lib/**

  Minimuxer:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.Minimuxer
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
    sources:
      - path: ../../ThirdParty/SideStore/Source/Dependencies/minimuxer/Sources
    dependencies:
      - target: RustBridge
      - package: ZIPFoundation
        product: ZIPFoundation

  SideStore:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.SideStore
        PRODUCT_MODULE_NAME: SideStore
        DEFINES_MODULE: "YES"
        CLANG_ENABLE_MODULES: "YES"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStore $(SRCROOT)/../../ThirdParty/SideStore/Source/AltStoreCore $(SRCROOT)/../../ThirdParty/SideStore/Source/Shared"
    sources:
      - path: Sources/SideStoreEmbedded
      - path: ../../ThirdParty/SideStore/Source/AltStore
        excludes:
          - AppDelegate.swift
          - SceneDelegate.swift
          - Info.plist
          - AltStore-Bridging-Header.h
          - Intents/**
          - Extensions/INInteraction+AltStore.swift
      - path: ../../ThirdParty/SideStore/Source/SideStore
        excludes:
          - Tests/**
          - Utils/misc/**
          - EMProxyWrapper.swift
    dependencies:
      - target: AltStoreCore
      - target: Roxas
      - sdk: AVFoundation.framework
      - sdk: CoreHaptics.framework
      - sdk: Intents.framework
      - sdk: IntentsUI.framework
      - sdk: MessageUI.framework
      - sdk: QuickLook.framework
      - sdk: SafariServices.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: WidgetKit.framework
      - package: AltSign
        product: AltSign-Dynamic
      - package: SemanticVersion
        product: SemanticVersion
      - package: Starscream
        product: Starscream
      - package: KeychainAccess
        product: KeychainAccess
      - package: MarkdownKit
        product: MarkdownKit
      - package: Nuke
        product: Nuke
      - target: Minimuxer

  Litter:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/Litter/Litter.entitlements
      properties:
        aps-environment: production
        com.apple.developer.carplay-voice-based-conversation: true
        # iCloud KVS sync (Feature C). Re-add when the iCloud container
        # `iCloud.com.sigkitten.litter` exists in the Apple Developer Portal
        # AND is enabled on the iOS app's provisioning profile. Without
        # both, archive fails: "Provisioning profile doesn't include the
        # iCloud capability."
        # com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)iCloud.com.sigkitten.litter
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
    sources:
      - path: Sources/Litter
        excludes:
          - Resources/BuildKitAssets/**
          - "**/*.h"
      - path: Sources/Litter/Bridge/UniFFICodexClient.generated.swift
      - path: Resources/fs
        type: folder
        buildPhase: resources
      - path: Sources/LitterLiveActivity/CodexTurnLiveActivity.swift
      - path: Sources/LitterWatch/Models/WatchModels.swift
      - path: Sources/LitterWatch/Models/WatchSize.swift
      - path: Sources/LitterWatch/Models/WatchHapticDetector.swift
      - path: Sources/LitterWatch/Models/WatchSnapshotStore.swift
      - path: Sources/LitterWatch/Models/WatchDeepLinkRouter.swift
      - path: Sources/LitterWatchComplications/LitterServerListPayload.swift
      - path: Sources/LitterWatchComplications/LitterComplicationEntry.swift
      - path: Sources/LitterWatchComplications/LitterRunningTurnPayload.swift
    resources:
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/Litter/Resources/Themes
      - path: Sources/Litter/Resources/BuildKit
      - path: Sources/Litter/Resources/TipJarProducts.storekit
      - path: Sources/Litter/Resources/home_cat.png
      - path: Sources/Litter/Resources/home_cat_entrance.png
      - path: Sources/Litter/Resources/cat_transmission_01.png
      - path: Sources/Litter/Resources/cat_transmission_02.png
      - path: Sources/Litter/Resources/cat_transmission_03.png
      - path: Sources/Litter/Resources/cat_transmission_04.png
      - path: Sources/Litter/Resources/cat_transmission_05.png
      - path: Sources/Litter/Resources/cat_transmission_06.png
    dependencies:
      - sdk: CarPlay.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: CoreVideo.framework
      - sdk: IOSurface.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Accelerate.framework
      - package: Hairball
        product: HairballUI
      - package: WebRTC
        product: WebRTC
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: AltSign
        product: AltSign-Dynamic
        embed: true
      - target: AltStoreCore
        embed: true
      - target: Roxas
        embed: true
      - target: Minimuxer
        embed: true
      - target: RustBridge
        embed: true
      - package: SemanticVersion
        product: SemanticVersion
        embed: true
      - package: KeychainAccess
        product: KeychainAccess
        embed: true
      - target: SideStore
        embed: true
      - target: LitterLiveActivity
        embed: true
      - target: LitterWatch
        embed: true
    postBuildScripts:
      - name: Embed AltSign Dynamic Framework
        script: |
          set -eu
          if [ "${PLATFORM_NAME:-}" != "iphoneos" ]; then
            exit 0
          fi
          mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          sign_if_requested() {
            item="$1"
            if [ "${CODE_SIGNING_ALLOWED:-NO}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
              /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$item"
            fi
          }
          embed_framework_if_present() {
            name="$1"
            required="$2"
            source=""
            checked=""
            for candidate in \
              "$BUILT_PRODUCTS_DIR/PackageFrameworks/$name.framework" \
              "$CONFIGURATION_BUILD_DIR/PackageFrameworks/$name.framework" \
              "$PROJECT_TEMP_DIR/../UninstalledProducts/$PLATFORM_NAME/$name.framework" \
              "$CONFIGURATION_TEMP_DIR/../../UninstalledProducts/$PLATFORM_NAME/$name.framework" \
              "$TARGET_TEMP_DIR/../../../UninstalledProducts/$PLATFORM_NAME/$name.framework" \
              "$TARGET_BUILD_DIR/PackageFrameworks/$name.framework" \
              "$BUILT_PRODUCTS_DIR/$name.framework" \
              "$CONFIGURATION_BUILD_DIR/$name.framework" \
              "$TARGET_BUILD_DIR/$name.framework"
            do
              if [ ! -d "$candidate" ]; then
                continue
              fi
              checked="${checked} ${candidate}"
              if [ -f "$candidate/Info.plist" ] && [ -f "$candidate/$name" ]; then
                source="$candidate"
                break
              fi
              echo "warning: skipping incomplete $name.framework candidate at $candidate" >&2
            done
            if [ -z "$source" ]; then
              if [ "$required" = "1" ]; then
                echo "error: required framework $name.framework was not built as a complete framework bundle" >&2
                printf 'Checked candidates:%s\n' "$checked" >&2
                exit 1
              fi
              return 0
            fi
            destination="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/$name.framework"
            rm -rf "$destination"
            /usr/bin/ditto "$source" "$destination"
            if [ ! -f "$destination/Info.plist" ] || [ ! -f "$destination/$name" ]; then
              echo "error: copied $name.framework is incomplete at $destination" >&2
              exit 1
            fi
            sign_if_requested "$destination"
            echo "Embedded $name.framework from $source"
          }
          embed_framework_if_present AltSign-Dynamic 1
          embed_framework_if_present OpenSSL 0
      - name: Embed Upstream Store Sources
        script: |
          set -eu
          RESOURCES_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          DEST_ROOT="$RESOURCES_DIR/UpstreamApps"
          copy_upstream_source() {
            label="$1"
            source="$2"
            destination="$DEST_ROOT/$label"
            if [ ! -d "$source" ]; then
              echo "error: missing upstream source folder: $source" >&2
              exit 1
            fi
            rm -rf "$destination"
            mkdir -p "$DEST_ROOT"
            /usr/bin/ditto "$source" "$destination"
            if [ ! -d "$destination" ]; then
              echo "error: failed to embed upstream source folder: $label" >&2
              exit 1
            fi
            echo "Embedded upstream $label source at $destination"
          }
          copy_upstream_source SideStore "$SRCROOT/../../ThirdParty/SideStore/Source"
          copy_upstream_source Feather "$SRCROOT/../../ThirdParty/Feather/Source"
          copy_upstream_source LocalDevVPN "$SRCROOT/../../ThirdParty/SideStore/LocalDevVPN-Source"
      - name: Package Private BuildKit Assets
        script: |
          set -eu
          ASSET_ROOT="$SRCROOT/Sources/Litter/Resources/BuildKitAssets"
          if [ ! -f "$ASSET_ROOT/manifest.json" ]; then
            exit 0
          fi
          RESOURCES_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          DEST="$RESOURCES_DIR/LitterBuildKitAssets.zip"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          rm -rf "$RESOURCES_DIR/BuildKitAssets" "$DEST"
          mkdir -p "$RESOURCES_DIR"
          cp -R -L "$ASSET_ROOT" "$TMP_DIR/BuildKitAssets"
          (cd "$TMP_DIR" && ditto -c -k --norsrc --keepParent BuildKitAssets "$DEST")
      - name: Embed Private BuildKit Frameworks
        script: |
          set -eu
          if [ "${PLATFORM_NAME:-}" != "iphoneos" ]; then
            exit 0
          fi
          MANIFEST="$SRCROOT/Sources/Litter/Resources/BuildKitAssets/manifest.json"
          ASSET_ROOT="$SRCROOT/Sources/Litter/Resources/BuildKitAssets/Toolchains/Nyxian"
          if [ ! -f "$MANIFEST" ] || [ ! -d "$ASSET_ROOT" ]; then
            exit 0
          fi
          mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          is_buildkit_support_dylib_name() {
            case "$1" in
              lib_Compiler*.dylib|libLLVM*.dylib|libllvm*.dylib) return 0 ;;
              *) return 1 ;;
            esac
          }
          is_macho_stub_dylib() {
            /usr/bin/file "$1" 2>/dev/null | /usr/bin/grep -Eiq 'Mach-O.*stub|stub.*Mach-O'
          }
          buildkit_framework_install_name() {
            binary="$1"
            parent="$(basename "$(dirname "$binary")")"
            base="$(basename "$binary")"
            case "$parent/$base" in
              CoreCompiler.framework/CoreCompiler|LitterBuildKitNative.framework/LitterBuildKitNative)
                printf '%s\n' "@rpath/$parent/$base"
                ;;
            esac
          }
          is_buildkit_corecompiler_reference() {
            case "$1" in
              *CoreCompiler.framework/CoreCompiler) return 0 ;;
              *) return 1 ;;
            esac
          }
          set_buildkit_install_name() {
            binary="$1"
            base="$(basename "$binary")"
            framework_id="$(buildkit_framework_install_name "$binary")"
            if [ -n "$framework_id" ]; then
              /usr/bin/install_name_tool -id "$framework_id" "$binary"
            elif is_buildkit_support_dylib_name "$base"; then
              /usr/bin/install_name_tool -id "@rpath/$base" "$binary"
            fi
          }
          rewrite_buildkit_dylib_references() {
            binary="$1"
            if [ ! -f "$binary" ]; then
              return 0
            fi
            set_buildkit_install_name "$binary"
            /usr/bin/otool -L "$binary" | /usr/bin/awk 'NR > 1 { print $1 }' | while IFS= read -r dependency; do
              base="$(basename "$dependency")"
              if is_buildkit_corecompiler_reference "$dependency" && [ "$dependency" != "@rpath/CoreCompiler.framework/CoreCompiler" ]; then
                /usr/bin/install_name_tool -change "$dependency" "@rpath/CoreCompiler.framework/CoreCompiler" "$binary" 2>/dev/null || true
              elif is_buildkit_support_dylib_name "$base" && [ "$dependency" != "@rpath/$base" ]; then
                /usr/bin/install_name_tool -change "$dependency" "@rpath/$base" "$binary" 2>/dev/null || true
              fi
            done
          }
          buildkit_binary_needs_rpath() {
            binary="$1"
            /usr/bin/otool -L "$binary" | /usr/bin/grep -Eq 'CoreCompiler\.framework/CoreCompiler|lib_Compiler|libLLVM|libllvm'
          }
          has_usable_frameworks_rpath() {
            binary="$1"
            rpath="$2"
            /usr/bin/otool -l "$binary" | /usr/bin/grep -F -q "$rpath" || \
              /usr/bin/otool -l "$binary" | /usr/bin/grep -F -q '@executable_path/Frameworks'
          }
          ensure_rpath() {
            binary="$1"
            rpath="$2"
            if has_usable_frameworks_rpath "$binary" "$rpath"; then
              return 0
            fi
            /usr/bin/install_name_tool -add_rpath "$rpath" "$binary"
            if ! has_usable_frameworks_rpath "$binary" "$rpath"; then
              echo "error: failed to add a usable Frameworks rpath to $binary" >&2
              exit 1
            fi
          }
          repair_buildkit_rpath() {
            binary="$1"
            rpath="$2"
            if [ ! -f "$binary" ]; then
              return 0
            fi
            if is_macho_stub_dylib "$binary"; then
              return 0
            fi
            rewrite_buildkit_dylib_references "$binary"
            if buildkit_binary_needs_rpath "$binary"; then
              ensure_rpath "$binary" "$rpath"
            fi
          }
          sign_if_requested() {
            item="$1"
            if ! command -v codesign >/dev/null 2>&1; then
              return 0
            fi
            if [ "${CODE_SIGNING_ALLOWED:-NO}" = "YES" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
              codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$item"
            else
              codesign --force --sign - --timestamp=none "$item"
            fi
          }
          for framework in CoreCompiler.framework LitterBuildKitNative.framework; do
            if [ -d "$ASSET_ROOT/$framework" ]; then
              destination="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/$framework"
              executable="${framework%.framework}"
              rm -rf "$destination"
              cp -R "$ASSET_ROOT/$framework" "$destination"
              rm -rf "$destination/CoreCompilerSupportLibs"
              if [ ! -f "$destination/$executable" ]; then
                echo "error: $framework is missing executable $executable" >&2
                if [ -f "$destination/$executable.tbd" ]; then
                  echo "error: found $executable.tbd instead; rebuild BuildKit assets from the real framework product, not EagerLinkingTBDs" >&2
                fi
                exit 1
              fi
              if [ ! -f "$destination/Info.plist" ]; then
                cat > "$destination/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>$executable</string>
            <key>CFBundleIdentifier</key>
            <string>com.sigkitten.litter.$executable</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>$executable</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>MinimumOSVersion</key>
            <string>18.0</string>
          </dict>
          </plist>
          PLIST
              fi
              repair_buildkit_rpath "$destination/$executable" "@loader_path/.."
              sign_if_requested "$destination"
            fi
          done
          copy_buildkit_support_dylibs_from() {
            root="$1"
            if [ ! -d "$root" ]; then
              return 0
            fi
            find "$root" -type f \( -name 'lib_Compiler*.dylib' -o -name 'libLLVM*.dylib' -o -name 'libllvm*.dylib' \) -print | while IFS= read -r library; do
              if is_macho_stub_dylib "$library"; then
                continue
              fi
              destination="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/$(basename "$library")"
              rm -f "$destination"
              cp "$library" "$destination"
              repair_buildkit_rpath "$destination" "@loader_path"
              sign_if_requested "$destination"
            done
          }
          SUPPORT_ROOT="$ASSET_ROOT/CoreCompilerSupportLibs"
          SDK_ROOT="$SRCROOT/Sources/Litter/Resources/BuildKitAssets/SDK"
          copy_buildkit_support_dylibs_from "$SUPPORT_ROOT"
          copy_buildkit_support_dylibs_from "$SDK_ROOT"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter
        INFOPLIST_FILE: Sources/Litter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIBackgroundModes: "audio fetch remote-notification picture-in-picture"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty $(KITTYSTORE_MINIMUXER_LDFLAGS)"
        Release:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty"
  LitterMac:
    type: application
    platform: auto
    supportedDestinations:
      - macCatalyst
    entitlements:
      path: Sources/Litter/Litter-Catalyst.entitlements
      properties:
        aps-environment: production
        # iCloud KVS sync (Feature C). Re-add when the iCloud container
        # `iCloud.com.sigkitten.litter` exists in the Apple Developer Portal
        # AND the Mac App Store profile is regenerated to include the iCloud
        # capability. Direct-dist (DeveloperID entitlements) keeps the key
        # because Developer ID apps validate iCloud at runtime, not via profile.
        # com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)iCloud.com.sigkitten.litter
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
        com.apple.security.app-sandbox: true
        com.apple.security.device.bluetooth: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    sources:
      - path: Sources/Litter
        excludes:
          - CarPlay/**
          - Info.plist
          - Litter.entitlements
          - Litter-Catalyst.entitlements
          - Litter-Catalyst-DeveloperID.entitlements
          - Models/AppLifecycleController.swift
          - Models/AppRuntimeController.swift
          - Models/CodexTurnAttributes.swift
          - Models/CodexVoiceCallAttributes.swift
          - Models/OrientationResponder.swift
          - Models/RealtimeWebRtcSession.swift
          - Models/StableSafeAreaInsets.swift
          - Models/TurnLiveActivityController.swift
          - Models/VoiceRuntimeController.swift
          - Models/VoiceSessionControl.swift
          - Models/VoiceSessionModels.swift
          - Models/WatchCompanionBridge.swift
          - Models/WatchProjection.swift
          - Resources/BuildKitAssets/**
          - Generated/Minimuxer/**
          - Views/HomeVoiceOrbButton.swift
          - Views/InlineVoiceButton.swift
          - Views/InlineVoiceStatusStrip.swift
          - Views/LiveActivityPreview.swift
          - Views/LockScreenCardView.swift
          - Views/RealtimeVoiceScreen.swift
          - Views/VoiceCallView.swift
          - "**/*.h"
      - path: Sources/Litter/Bridge/UniFFICodexClient.generated.swift
    resources:
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/Litter/Resources/Themes
      - path: Sources/Litter/Resources/BuildKit
      - path: Sources/Litter/Resources/TipJarProducts.storekit
      - path: Sources/Litter/Resources/home_cat.png
      - path: Sources/Litter/Resources/home_cat_entrance.png
      - path: Sources/Litter/Resources/cat_transmission_01.png
      - path: Sources/Litter/Resources/cat_transmission_02.png
      - path: Sources/Litter/Resources/cat_transmission_03.png
      - path: Sources/Litter/Resources/cat_transmission_04.png
      - path: Sources/Litter/Resources/cat_transmission_05.png
      - path: Sources/Litter/Resources/cat_transmission_06.png
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - sdk: Metal.framework
      - package: Hairball
        product: HairballUI
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
    settings:
      base:
        PRODUCT_NAME: Litter
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        INFOPLIST_FILE: Sources/Litter/Info-Catalyst.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MACCATALYST_OPTIMIZED_FOR_MAC: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        "LIBRARY_SEARCH_PATHS[sdk=macosx*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-macabi"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty $(KITTYSTORE_MINIMUXER_LDFLAGS)"
        Release:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty"
        # Direct-distribution (notarized .dmg) lane. Re-points
        # CODE_SIGN_ENTITLEMENTS at the unsandboxed entitlements file so the
        # Mac build can spawn a local `codex app-server`. Same automatic
        # signing flow as Release; the actual cert is selected via the
        # APP_CODE_SIGN_IDENTITY override the script passes through.
        DeveloperID:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lresolv -lcodex_mobile_client -lghostty"
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: Sources/Litter/Litter-Catalyst-DeveloperID.entitlements
  LitterLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/LitterLiveActivity/LitterLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterLiveActivity
      - path: Sources/Litter/Models/CodexTurnAttributes.swift
      - path: Sources/Litter/Models/CodexVoiceCallAttributes.swift
      - path: Sources/Litter/Models/LitterPalette.swift
      - path: Sources/Litter/Models/VoiceSessionControl.swift
      - path: Sources/Litter/Views/LockScreenCardView.swift
    resources:
      - path: Sources/LitterLiveActivity/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.liveactivity
        INFOPLIST_FILE: Sources/LitterLiveActivity/Info.plist
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
        OTHER_SWIFT_FLAGS: "$(inherited)"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(LIVE_ACTIVITY_CODE_SIGN_STYLE)"
          LIVE_ACTIVITY_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER)"
          LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER: ""
          ENABLE_DEBUG_DYLIB: NO
        Release:
          CODE_SIGN_STYLE: "$(LIVE_ACTIVITY_CODE_SIGN_STYLE)"
          LIVE_ACTIVITY_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(LIVE_ACTIVITY_CODE_SIGN_IDENTITY)"
          LIVE_ACTIVITY_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER)"
          LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER: ""
  LitterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: Sources/LitterWatch/LitterWatch.entitlements
      properties:
        aps-environment: production
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterWatch
        excludes:
          - "Assets.xcassets"
      - path: Sources/Litter/AppIcon.icon
    resources:
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/LitterWatch/Assets.xcassets
    dependencies:
      - target: LitterWatchComplications
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.watchkitapp
        INFOPLIST_FILE: Sources/LitterWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        GENERATE_INFOPLIST_FILE: NO
        SDKROOT: watchos
        SUPPORTS_MACCATALYST: NO
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(WATCH_CODE_SIGN_STYLE)"
          WATCH_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: "$(WATCH_CODE_SIGN_STYLE)"
          WATCH_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(WATCH_CODE_SIGN_IDENTITY)"
          WATCH_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_PROVISIONING_PROFILE_SPECIFIER: ""

  LitterWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: Sources/LitterWatchComplications/LitterWatchComplications.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterWatchComplications
        excludes:
          - "Assets.xcassets"
    resources:
      - path: Sources/LitterWatchComplications/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.watchkitapp.complications
        INFOPLIST_FILE: Sources/LitterWatchComplications/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        SDKROOT: watchos
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(WATCH_COMP_CODE_SIGN_STYLE)"
          WATCH_COMP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: "$(WATCH_COMP_CODE_SIGN_STYLE)"
          WATCH_COMP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(WATCH_COMP_CODE_SIGN_IDENTITY)"
          WATCH_COMP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER: ""

  LitterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/LitterTests
    dependencies:
      - target: Litter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false
  LitterUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/LitterUITests
      - path: SnapshotHelper.swift
    dependencies:
      - target: Litter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Litter
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false

schemes:
  LitterWatch:
    build:
      targets:
        LitterWatch: all
        LitterWatchComplications: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 2
  Litter:
    build:
      targets:
        Litter: all
    run:
      config: Debug
      customLLDBInit: $(SRCROOT)/.lldbinit
    test:
      config: Debug
      targets:
        - LitterTests
        - LitterUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 1
  LitterMac:
    build:
      targets:
        LitterMac: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    # Default archive uses Release (sandboxed) for the App Store lane.
    # The direct-distribution script overrides via `-configuration DeveloperID`.
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 3
