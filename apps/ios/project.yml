  LiveProcess:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: ../../ThirdParty/EmexDE/Source/LiveProcess/LiveProcess.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.liveprocess
