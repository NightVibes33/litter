        excludes:
          - CCBaseSwift.swift
          - CoreCompiler.docc/**
          - CoreCompilerSupportLibs/**
    dependencies:
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/LLVM.xcframework
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftBasicFormat.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftCompilerPluginMessageHandling.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftDiagnostics.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftIDEUtils.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftIfConfig.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftLexicalLookup.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftOperators.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftParser.dylib
      - framework: ../../ThirdParty/EmexDE/Source/CoreCompiler/CoreCompilerSupportLibs/lib_CompilerSwiftParserDiagnostics.dylib
